<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEC Domain Knowledge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0c0f; --bg2:#111318; --bg3:#181c24; --bg4:#1e2330;
    --border:#252d3d; --border2:#2e3a50;
    --text:#dce6f5; --text2:#7d90b0; --text3:#445060;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
    --mep:#f0a500; --cad:#3b9eff; --bim:#3dd68c; --qs:#c46ef5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
  .header{padding:28px 32px 0;}
  .breadcrumb{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  h1{font-size:24px;font-weight:600;letter-spacing:-0.3px;}
  .subtitle{color:var(--text3);font-size:12.5px;margin-top:4px;font-family:var(--mono);}
  .tabs{display:flex;padding:20px 32px 0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:10px 22px 12px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:7px;user-select:none;}
  .tab:hover{color:var(--text2);}
  .tab[data-tab="mep"].active{color:var(--mep);border-color:var(--mep);}
  .tab[data-tab="cad"].active{color:var(--cad);border-color:var(--cad);}
  .tab[data-tab="bim"].active{color:var(--bim);border-color:var(--bim);}
  .tab[data-tab="qs"].active{color:var(--qs);border-color:var(--qs);}
  .toolbar{padding:12px 32px;background:var(--bg);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  .search-wrap{position:relative;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);}
  #search{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px 8px 36px;color:var(--text);font-size:13px;outline:none;font-family:var(--sans);transition:border-color .15s;}
  #search:focus{border-color:var(--border2);}
  #search::placeholder{color:var(--text3);}
  .filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
  .tag{padding:2px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .12s;font-family:var(--mono);letter-spacing:.3px;opacity:.4;}
  .tag.active{opacity:1;} .tag:hover{opacity:.75;}
  .tag-mep-ov{background:#1a1a00;color:#d4d400;border-color:#3a3a00;}
  .tag-mep-e{background:#2a1800;color:#f0a500;border-color:#5a3500;}
  .tag-mep-p{background:#001a2a;color:#3b9eff;border-color:#003a5a;}
  .tag-mep-h{background:#001a0f;color:#3dd68c;border-color:#003a20;}
  .tag-mep-f{background:#2a0000;color:#f55;border-color:#5a0000;}
  .tag-cad-n{background:#001a2a;color:#3b9eff;border-color:#003a5a;}
  .tag-cad-l{background:#0d1a2a;color:#70c0ff;border-color:#1a3a5a;}
  .tag-cad-b{background:#1a0a2a;color:#c46ef5;border-color:#3a1a5a;}
  .tag-cad-d{background:#001a10;color:#3dd68c;border-color:#003a25;}
  .tag-bim-c{background:#001a10;color:#3dd68c;border-color:#003a25;}
  .tag-bim-i{background:#2a1800;color:#f0a500;border-color:#5a3500;}
  .tag-bim-p{background:#1a0a2a;color:#c46ef5;border-color:#3a1a5a;}
  .tag-qs-u{background:#1a0a2a;color:#c46ef5;border-color:#3a1a5a;}
  .tag-qs-b{background:#2a1800;color:#f0a500;border-color:#5a3500;}
  .tag-qs-c{background:#001a10;color:#3dd68c;border-color:#003a25;}
  .tag-qs-o{background:#001a2a;color:#3b9eff;border-color:#003a5a;}
  .stats{padding:7px 32px;font-size:11px;color:var(--text3);font-family:var(--mono);border-bottom:1px solid var(--border);}
  .sec-hdr{padding:18px 32px 6px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:2px;font-family:var(--mono);border-top:1px solid var(--border);margin-top:4px;}
  .sec-hdr:first-of-type{border-top:none;}
  .card{margin:0 32px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .12s;}
  .card:hover{border-color:var(--border2);}
  .card-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;}
  .badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;flex-shrink:0;letter-spacing:.5px;}
  .card-title{font-size:13.5px;font-weight:500;color:var(--text);flex:1;}
  .card-en{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0;margin-left:auto;padding-left:10px;}
  .chev{font-size:11px;color:var(--text3);transition:transform .15s;flex-shrink:0;}
  .card.open .chev{transform:rotate(180deg);}
  .card-body{display:none;padding:0 14px 14px;}
  .card.open .card-body{display:block;}
  .desc{color:var(--text2);font-size:13px;margin-bottom:10px;line-height:1.75;}
  .bilingual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .bil-col{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:8px 11px;}
  .bil-lang{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .bil-content{font-size:12.5px;color:var(--text2);line-height:1.6;}
  .note{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:10px 13px;margin-bottom:10px;font-size:12.5px;color:var(--text2);line-height:1.65;}
  .note-lbl{font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
  .sym-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px;margin-bottom:10px;}
  .sym{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:7px 10px;}
  .sym-code{font-family:var(--mono);font-weight:600;font-size:12.5px;}
  .sym-en{font-size:11px;color:var(--text2);margin-top:1px;}
  .sym-vi{font-size:11px;color:var(--text3);margin-top:1px;}
  .tip{border-left:2px solid var(--border2);padding:7px 11px;font-size:12px;color:var(--text3);font-family:var(--mono);line-height:1.6;border-radius:0 4px 4px 0;margin-top:8px;}
  pre{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:11px 14px;font-family:var(--mono);font-size:12px;color:#c0d0e8;overflow-x:auto;line-height:1.7;margin-bottom:10px;white-space:pre;}
  .c{color:#445060;} .kw{color:#c46ef5;} .fn{color:#3b9eff;} .st{color:#3dd68c;} .nm{color:#f0a500;}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .compare-col{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:10px 12px;}
  .compare-title{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .compare-item{font-size:12px;color:var(--text2);padding:2px 0;border-bottom:1px solid var(--border);line-height:1.6;}
  .compare-item:last-child{border-bottom:none;}
  .empty{padding:48px 32px;text-align:center;color:var(--text3);font-family:var(--mono);}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
  @media(max-width:600px){.bilingual,.compare{grid-template-columns:1fr;}.sym-grid{grid-template-columns:1fr 1fr;}.card,.sec-hdr{margin-left:16px;margin-right:16px;}.header,.toolbar,.stats{padding-left:16px;padding-right:16px;}.tabs{padding-left:16px;}}
</style>
</head>
<body>

<div class="tabs">

<div class="stats" id="stats"></div>
<div id="content"></div>

  {cat:"Layer & Data",en:"Layer Python",
   title:"Parse Layer trong Python — classify entity tự động",
   desc:"Dùng layer name để tự động phân loại entity về hệ thống MEP mà không cần AI.",
   code:`<span class="kw">import</span> ezdxf, re
<span class="kw">from</span> collections <span class="kw">import</span> defaultdict

doc = ezdxf.<span class="fn">readfile</span>(<span class="st">"mep.dxf"</span>)

<span class="c"># Mapping layer prefix → MEP system</span>
SYSTEM_MAP = {
    <span class="st">"E-"</span>: <span class="st">"Electrical"</span>,
    <span class="st">"M-"</span>: <span class="st">"Mechanical"</span>,
    <span class="st">"P-"</span>: <span class="st">"Plumbing"</span>,
    <span class="st">"F-"</span>: <span class="st">"Fire Protection"</span>,
}

<span class="kw">def</span> <span class="fn">classify_layer</span>(layer_name):
    layer = layer_name.<span class="fn">upper</span>()
    <span class="kw">for</span> prefix, system <span class="kw">in</span> SYSTEM_MAP.items():
        <span class="kw">if</span> layer.<span class="fn">startswith</span>(prefix):
            <span class="kw">return</span> system
    <span class="kw">return</span> <span class="st">"Unknown"</span>

<span class="c"># Group INSERT entities theo hệ thống</span>
by_system = defaultdict(list)
<span class="kw">for</span> e <span class="kw">in</span> doc.modelspace().query(<span class="st">"INSERT"</span>):
    system = <span class="fn">classify_layer</span>(e.dxf.layer)
    by_system[system].append(e.dxf.name)

<span class="kw">for</span> system, blocks <span class="kw">in</span> by_system.items():
    <span class="fn">print</span>(<span class="st">f"{system}: {len(blocks)} blocks"</span>)`,
   tip:"Layer prefix không chuẩn? Dùng keyword matching: 'HVAC' in layer_name.upper() thay vì prefix."},

  {cat:"Data Extraction",en:"DXF Structure",
   title:"Cấu trúc DXF & những thứ cần check đầu tiên",
   desc:"DXF là text file có cấu trúc section rõ ràng. Biết section nào chứa gì giúp debug nhanh khi thiếu data.",
   syms:[
     {code:"HEADER section",en:"System variables",vi:"Biến hệ thống: $INSUNITS (đơn vị!), $ACADVER, $MEASUREMENT"},
     {code:"CLASSES section",en:"Object class definitions",vi:"Định nghĩa object class — thường bỏ qua"},

   note:{lbl:"3 thứ check TRƯỚC KHI extract",text:"1. $INSUNITS → đơn vị bản vẽ (4=mm, 6=meter, 1=inch)\n   Sai đơn vị = sai chiều dài hoàn toàn\n\n2. List tất cả layer → hiểu cấu trúc, tìm prefix pattern\n\n3. List tất cả block name duy nhất → xem có bao nhiêu loại, tên có pattern gì"},
   code:`<span class="c"># 3 bước check đầu tiên</span>
<span class="kw">import</span> ezdxf
<span class="kw">from</span> collections <span class="kw">import</span> Counter

doc = ezdxf.<span class="fn">readfile</span>(<span class="st">"drawing.dxf"</span>)
msp = doc.modelspace()

<span class="c"># 1. Check đơn vị</span>
units = {<span class="nm">1</span>:<span class="st">'inch'</span>,<span class="nm">4</span>:<span class="st">'mm'</span>,<span class="nm">6</span>:<span class="st">'meter'</span>}
ins = doc.header.get(<span class="st">'$INSUNITS'</span>,<span class="nm">0</span>)

<span class="c"># 2. List layers</span>
layers = [l.dxf.name <span class="kw">for</span> l <span class="kw">in</span> doc.layers]
<span class="fn">print</span>(<span class="st">f"Layers ({len(layers)}): {layers[:10]}"</span>)

<span class="c"># 3. Block frequency</span>
blocks = Counter(e.dxf.name <span class="kw">for</span> e <span class="kw">in</span>
                 msp.query(<span class="st">"INSERT"</span>))
<span class="fn">print</span>(blocks.most_common(<span class="nm">20</span>))`,
   tip:"most_common(20) cho bạn thấy 20 block dùng nhiều nhất — đây là những block quan trọng nhất cần map vào catalog."},

  {cat:"Data Extraction",en:"Block Name Matching",
   title:"Block Name Matching — rule-based + AI hybrid",
   desc:"Cùng 1 thiết bị, 50 công ty đặt 50 tên block khác nhau. Hybrid approach: rule-based match trước, AI fallback khi rule miss.",
   code:`<span class="kw">import</span> re
<span class="kw">from</span> sentence_transformers <span class="kw">import</span> SentenceTransformer
<span class="kw">import</span> numpy <span class="kw">as</span> np

<span class="c"># ── BƯỚC 1: Rule-based (nhanh, không cần GPU) ──</span>
RULES = [
    (<span class="st">r'GPO|SOCKET|OUTLET|PLUG'</span>, <span class="st">'Power Outlet'</span>),
    (<span class="st">r'DS|DBL.SOCK|2.GANG'</span>,   <span class="st">'Double Socket'</span>),
    (<span class="st">r'LIGHT|LAMP|DL|DOWN'</span>,   <span class="st">'Light Fixture'</span>),
    (<span class="st">r'SPK|SPKR|SPRINK'</span>,      <span class="st">'Sprinkler'</span>),
    (<span class="st">r'DB|MDB|SDB|DIST.BOARD'</span>,<span class="st">'Distribution Board'</span>),
    (<span class="st">r'FCU|FAN.COIL'</span>,          <span class="st">'Fan Coil Unit'</span>),
]

<span class="kw">def</span> <span class="fn">rule_match</span>(block_name):
    name = block_name.<span class="fn">upper</span>()
    <span class="kw">for</span> pattern, label <span class="kw">in</span> RULES:
        <span class="kw">if</span> re.<span class="fn">search</span>(pattern, name):
            <span class="kw">return</span> label, <span class="nm">1.0</span>
    <span class="kw">return</span> <span class="nm">None</span>, <span class="nm">0.0</span>

<span class="c"># ── BƯỚC 2: AI fallback (chỉ khi rule miss) ──</span>
model = SentenceTransformer(<span class="st">'all-MiniLM-L6-v2'</span>)
CATALOG = [<span class="st">"Power Outlet"</span>, <span class="st">"Double Socket"</span>,
           <span class="st">"Light Fixture"</span>, <span class="st">"Sprinkler"</span>]
cat_emb = model.<span class="fn">encode</span>(CATALOG)

<span class="kw">def</span> <span class="fn">match</span>(block_name):
    label, conf = <span class="fn">rule_match</span>(block_name)
    <span class="kw">if</span> label: <span class="kw">return</span> label, conf, <span class="st">'rule'</span>
    q = model.<span class="fn">encode</span>([block_name])
    scores = np.<span class="fn">dot</span>(q, cat_emb.T)[<span class="nm">0</span>]
    i = np.<span class="fn">argmax</span>(scores)
    <span class="kw">return</span> CATALOG[i], <span class="fn">float</span>(scores[i]), <span class="st">'ai'</span>`,
   note:{lbl:"Confidence thresholds",text:"conf >= 0.9 → auto-accept, đưa vào BOQ\nconf 0.7–0.9 → accept nhưng flag để review\nconf < 0.7  → reject, flag là UNMATCHED\n\nLuôn export danh sách UNMATCHED ra Excel để review thủ công. Không bao giờ auto-accept 100%."},
   tip:"Build và refine RULES từ dữ liệu thực tế của từng client. Rule library ngày càng tốt hơn sau mỗi project."},

  {cat:"Data Extraction",en:"Linear Measurement",
   title:"Đo chiều dài — pipe, cable, duct từ DXF",
   desc:"Tính chiều dài đường ống và cáp từ LINE, LWPOLYLINE, SPLINE entities. Kết quả phải nhân với hệ số đơn vị.",
   code:`<span class="kw">import</span> ezdxf, math

doc = ezdxf.<span class="fn">readfile</span>(<span class="st">"plumbing.dxf"</span>)
msp = doc.modelspace()

<span class="c"># Scale factor từ INSUNITS về meter</span>
SCALE = {<span class="nm">1</span>:<span class="nm">0.0254</span>, <span class="nm">4</span>:<span class="nm">0.001</span>, <span class="nm">6</span>:<span class="nm">1.0</span>}
ins = doc.header.get(<span class="st">'$INSUNITS'</span>, <span class="nm">4</span>)
scale = SCALE.get(ins, <span class="nm">0.001</span>)  <span class="c"># default mm</span>

pipe_length = <span class="nm">0.0</span>

<span class="kw">for</span> e <span class="kw">in</span> msp.query(<span class="st">'*[layer=="P-CWS-PIPE"]'</span>):
    <span class="kw">if</span> e.dxftype() == <span class="st">'LINE'</span>:
        s, end = e.dxf.start, e.dxf.end
        pipe_length += math.<span class="fn">dist</span>(
            (s.x,s.y,s.z), (end.x,end.y,end.z))

    <span class="kw">elif</span> e.dxftype() == <span class="st">'LWPOLYLINE'</span>:
        pts = list(e.get_points())
        <span class="kw">for</span> i <span class="kw">in</span> range(len(pts)-<span class="nm">1</span>):
            pipe_length += math.<span class="fn">dist</span>(
                pts[i][:2], pts[i+<span class="nm">1</span>][:2])

<span class="fn">print</span>(<span class="st">f"Pipe CWS: {pipe_length * scale:.2f} m"</span>)`,
   tip:"SPLINE pipe: dùng e.flattening(0.01) để convert sang polyline points trước khi tính chiều dài."},
],

   code:`<span class="kw">import</span> ifcopenshell
<span class="kw">import</span> ifcopenshell.util.element <span class="kw">as</span> util
<span class="kw">import</span> pandas <span class="kw">as</span> pd

model = ifcopenshell.<span class="fn">open</span>(<span class="st">"building.ifc"</span>)

<span class="kw">def</span> <span class="fn">extract_element</span>(elem):
    psets = util.<span class="fn">get_psets</span>(elem)
    <span class="c"># Flatten tất cả Pset vào 1 dict</span>
    flat = {}
    <span class="kw">for</span> pset_name, props <span class="kw">in</span> psets.items():
        <span class="kw">for</span> k, v <span class="kw">in</span> props.items():
            flat[<span class="st">f"{pset_name}.{k}"</span>] = v

    <span class="c"># Lấy spatial location</span>

        <span class="st">"IFC_Type"</span>:   elem.is_a(),
        <span class="st">"Name"</span>:       elem.Name,
        <span class="st">"Level"</span>:      storey.Name <span class="kw">if</span> storey <span class="kw">else</span> <span class="st">""</span>,
        **flat
    }

<span class="c"># Extract tất cả MEP terminals</span>

        <span class="kw">for</span> e <span class="kw">in</span> model.by_type(<span class="st">"IfcFlowTerminal"</span>)]

// ── State ──
let tab="mep", filters=new Set();

function initFilters(){
  const t=TABS[tab];
  filters=new Set(t.filters.map(f=>f.key));
  const row=document.getElementById("filterRow");
  row.innerHTML="";
  t.filters.forEach(f=>{
    const el=document.createElement("span");
    el.className=`tag ${f.cls} active`;
    el.textContent=f.label;
    el.dataset.key=f.key;
    el.addEventListener("click",()=>{
      if(filters.has(f.key)){filters.delete(f.key);el.classList.remove("active");}
      else{filters.add(f.key);el.classList.add("active");}
      render();
    });
    row.appendChild(el);
  });
}

function mkSym(s){
  return `<div class="sym"><div class="sym-code">${s.code}</div><div class="sym-en">${s.en||""}</div><div class="sym-vi">${s.vi||""}</div></div>`;
}
function mkBil(b){
  return `<div class="bil-col"><div class="bil-lang">🇻🇳 Tiếng Việt</div><div class="bil-content">${b.vi}</div></div><div class="bil-col"><div class="bil-lang">🇬🇧 English</div><div class="bil-content">${b.en}</div></div>`;
}
function mkCompare(c){
  return `<div class="compare-col"><div class="compare-title" style="color:${TABS[tab].color}">${c.title}</div>${c.items.map(i=>`<div class="compare-item">${i}</div>`).join("")}</div>`;
}

function render(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  const content=document.getElementById("content");
  content.innerHTML="";
  let shown=0;
  const items=DATA[tab]||[];
  const t=TABS[tab];
  const groups={};
  items.forEach(item=>{
    if(!filters.has(item.cat))return;
    const searchText=(item.title+item.en+item.desc+
      (item.note?.text||"")+(item.note?.lbl||"")+
      (item.syms||[]).map(s=>`${s.code} ${s.en} ${s.vi}`).join(" ")+
      (item.bilingual||[]).map(b=>`${b.vi} ${b.en}`).join(" ")+
      (item.compare||[]).map(c=>`${c.title} ${c.items.join(" ")}`).join(" ")
    ).toLowerCase();
    if(q&&!searchText.includes(q))return;
    if(!groups[item.cat])groups[item.cat]=[];
    groups[item.cat].push(item);
    shown++;
  });

  Object.entries(groups).forEach(([cat,catItems])=>{
    const hdr=document.createElement("div");
    hdr.className="sec-hdr";
    hdr.textContent=cat;
    content.appendChild(hdr);
    catItems.forEach(item=>{
      const card=document.createElement("div");
      card.className="card";
      const fcls=t.filters.find(f=>f.key===item.cat)?.cls||"tag-mep-ov";
      const symsHtml=item.syms?`<div class="sym-grid">${item.syms.map(mkSym).join("")}</div>`:"";
      const bilHtml=item.bilingual?`<div class="bilingual">${item.bilingual.map(mkBil).join("")}</div>`:"";
      const cmpHtml=item.compare?`<div class="compare">${item.compare.map(mkCompare).join("")}</div>`:"";
      const noteHtml=item.note?`<div class="note"><div class="note-lbl" style="color:${t.color}">${item.note.lbl}</div>${item.note.text.replace(/\n/g,"<br>")}</div>`:"";
      const codeHtml=item.code?`<pre>${item.code}</pre>`:"";
      const tipHtml=item.tip?`<div class="tip">→ ${item.tip}</div>`:"";
      card.innerHTML=`
        <div class="card-hdr" onclick="this.closest('.card').classList.toggle('open')">
          <span class="badge ${fcls}">${item.cat}</span>
          <span class="card-title">${item.title}</span>
          <span class="card-en">${item.en||""}</span>
          <span class="chev">▾</span>
        </div>
        <div class="card-body">
          <p class="desc">${item.desc}</p>
          ${cmpHtml}${symsHtml}${bilHtml}${noteHtml}${codeHtml}${tipHtml}
        </div>`;
      content.appendChild(card);
    });
  });

  if(shown===0)content.innerHTML=`<div class="empty">// no results</div>`;
  document.getElementById("stats").textContent=
    `${shown} entries · ${tab.toUpperCase()} · ${q?`"${document.getElementById("search").value}"`:"all categories"}`;
}

document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    tab=t.dataset.tab;
    document.getElementById("search").value="";
    initFilters();render();
  });
});
document.getElementById("search").addEventListener("input",render);
initFilters();render();
</script>
