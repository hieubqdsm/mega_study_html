<style>
:root {
  --bg: #0e0f13;
  --surface: #16181f;
  --surface2: #1e2029;
  --border: #2a2d3a;
  --border2: #353848;
  --text: #e8eaf0;
  --muted: #8890a8;
  --hint: #555c74;

  --purple: #7c6ef5;
  --purple-bg: #1e1a3a;
  --purple-text: #b8b0ff;

  --teal: #2ec9a0;
  --teal-bg: #0d2620;
  --teal-text: #7ee8cb;

  --amber: #f0a040;
  --amber-bg: #271a08;
  --amber-text: #fac77a;

  --coral: #e8624a;
  --coral-bg: #2a1008;
  --coral-text: #f5a08a;

  --blue: #4a9ef0;
  --blue-bg: #0c1e35;
  --blue-text: #8ec8f8;

  --green: #5cc45a;
  --green-bg: #0f2010;
  --green-text: #9ee09d;

  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Header */
.header {
  margin-bottom: 40px;
}
.header-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--purple);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.header h1 {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 8px;
}
.header p {
  font-size: 14px;
  color: var(--muted);
}

/* Search */
.search-wrap {
  position: relative;
  margin-bottom: 20px;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px 10px 38px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search-wrap input::placeholder { color: var(--hint); }
.search-wrap input:focus { border-color: var(--purple); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--hint);
  font-size: 14px;
  pointer-events: none;
}

/* Filter pills */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 28px;
}
.f-btn {
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 999px;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .03em;
}
.f-btn:hover { border-color: var(--text); color: var(--text); }
.f-btn.active-editor  { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple); }
.f-btn.active-scene   { background: var(--teal-bg);   color: var(--teal-text);   border-color: var(--teal); }
.f-btn.active-go      { background: var(--amber-bg);  color: var(--amber-text);  border-color: var(--amber); }
.f-btn.active-code    { background: var(--coral-bg);  color: var(--coral-text);  border-color: var(--coral); }
.f-btn.active-asset   { background: var(--blue-bg);   color: var(--blue-text);   border-color: var(--blue); }
.f-btn.active-cam     { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple); }
.f-btn.active-tile    { background: var(--teal-bg);   color: var(--teal-text);   border-color: var(--teal); }
.f-btn.active-sort    { background: var(--coral-bg);  color: var(--coral-text);  border-color: var(--coral); }
.f-btn.active-path    { background: var(--amber-bg);  color: var(--amber-text);  border-color: var(--amber); }
.f-btn.active-coord   { background: var(--blue-bg);   color: var(--blue-text);   border-color: var(--blue); }

/* Section separator */
.section-sep {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 36px 0 16px;
}
.section-sep .label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  white-space: nowrap;
}
.section-sep .line {
  flex: 1;
  height: 0.5px;
  background: var(--border);
}

/* Card */
.card {
  border: 0.5px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .15s;
}
.card:hover { border-color: var(--border2); }
.card.open { border-color: var(--border2); }

.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
}

.pill {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 500;
  letter-spacing: .03em;

  // ── PHẦN 1 ──────────────────────────────────────────────────────

  {sec:'basics', cat:'editor', step:'Bước 0', name:'Unity Editor layout',

  {sec:'basics', cat:'editor', step:'Bước 0', name:'Project template',

  {sec:'basics', cat:'editor', step:'Bước 1', name:'Console window',
   def:'Nơi hiển thị Debug.Log(), warning (vàng) và error (đỏ). Error màu đỏ sẽ ngừng Play nếu bật Error Pause. Double-click lên dòng lỗi sẽ nhảy thẳng đến dòng code gây lỗi.',
   code:`Debug.Log("Giá trị x = " + x);        // Trắng

// Xoá console: Ctrl+Shift+C hoặc bấm Clear`,
   tip:"Bật 'Collapse' trong Console để gộp log lặp lại — không bị ngập khi Update() log liên tục."},

  {sec:'basics', cat:'scene', step:'Bước 1', name:'Scene',
   def:"Một 'màn chơi' hoặc 'phòng' trong game — có thể là Main Menu, Dungeon Floor 1, World Map... Mỗi Scene là một file .unity. Game chạy bằng cách load Scene, switch giữa các Scene.",
   code:`using UnityEngine.SceneManagement;
SceneManager.LoadScene("DungeonFloor1");

  {sec:'basics', cat:'scene', step:'Bước 1', name:'Scene View vs Game View',
   def:'Scene View: nơi bạn chỉnh sửa object, di chuyển, đặt tile — camera của developer. Game View: preview đúng như người chơi thấy qua Main Camera. Hai view hoàn toàn độc lập.',
   code:`// Tắt/bật Gizmos trong Scene View (icon trên toolbar)
// Bấm Play để switch sang Game View preview
// Alt+Click Scene View = xoay góc nhìn

   tip:"Nhấn Shift+F10 để maximize Game View toàn màn hình khi playtest."},

  {sec:'basics', cat:'scene', step:'Bước 1', name:'Gizmo',
   def:'Hình vẽ debug hiển thị trong Scene View — collider (viền xanh), camera frustum, light range, path... Không xuất hiện trong Game View. Cực kỳ hữu ích để debug vị trí và vùng ảnh hưởng.',
   code:`void OnDrawGizmos() {
    Gizmos.color = Color.red;
    Gizmos.DrawWireSphere(transform.position, attackRange);
}

  {sec:'basics', cat:'scene', step:'Bước 1', name:'Play Mode',
   def:'Khi bấm nút Play, Unity vào trạng thái Play Mode — game chạy thực sự. Mọi thay đổi trong Inspector lúc này là TẠM THỜI, sẽ mất khi Stop. Đây là bẫy phổ biến nhất của người mới.',
   code:`// CẢNH BÁO: thay đổi trong Play Mode sẽ bị mất!
// Tô màu editor khi Play để nhắc nhở:

// Đặt màu đỏ nhạt hoặc vàng để dễ nhận ra`,
   tip:"Cài ngay Playmode tint màu đỏ — tiết kiệm cho bạn rất nhiều lần làm lại từ đầu."},

  {sec:'basics', cat:'go', step:'Bước 2', name:'GameObject',
   def:'Mọi thứ trong Scene đều là GameObject — nhân vật, tile, camera, ánh sáng, âm thanh vô hình. GameObject tự nó rỗng; chức năng đến từ các Component gắn vào nó.',
   code:`GameObject obj = new GameObject("MyObject");

// Tạo từ code với component:
GameObject enemy = new GameObject("Enemy");
enemy.AddComponent<EnemyController>();
enemy.AddComponent<SpriteRenderer>();`,
   tip:"Nếu cần một 'manager' không có hình dạng (GameManager, AudioManager), tạo Empty GameObject."},

  {sec:'basics', cat:'go', step:'Bước 2', name:'Component',
   def:'Khối chức năng gắn vào GameObject. Mọi hành vi đều là Component: SpriteRenderer (vẽ sprite), Rigidbody2D (vật lý), AudioSource (phát âm thanh), script C# của bạn cũng là Component.',
   code:`SpriteRenderer sr = GetComponent<SpriteRenderer>();
Rigidbody2D rb = GetComponent<Rigidbody2D>();

// Lấy component của object khác:
Enemy e = otherObj.GetComponent<Enemy>();

// Lấy component con:
Health h = GetComponentInChildren<Health>();`,
   tip:"GetComponent() chạy chậm — luôn cache trong Awake(), không gọi trong Update()."},

  {sec:'basics', cat:'go', step:'Bước 2', name:'Transform',
   def:'Component duy nhất mà MỌI GameObject đều có — không thể xoá. Lưu position, rotation, scale. Cũng quản lý quan hệ parent–child giữa các object.',
   code:`transform.position = new Vector3(1f, 2f, 0f);
transform.Translate(Vector3.right * speed * Time.deltaTime);

// Parent-child:
childObj.transform.SetParent(parentObj.transform);

// Local vs World:
transform.localPosition  // tương đối với parent
transform.position       // trong world space`,
   tip:"Isometric RPG: luôn dùng transform.position.y để tính sorting order."},

  {sec:'basics', cat:'go', step:'Bước 2', name:'Prefab',
   def:'Template của một GameObject — tạo một lần, dùng lại nhiều lần. Kéo GameObject từ Hierarchy vào Project để tạo Prefab (file .prefab). Thay đổi Prefab gốc sẽ cập nhật tất cả instance.',

    GameObject e = Instantiate(enemyPrefab, pos, Quaternion.identity);

Destroy(e, 2f); // xoá sau 2 giây`,
   tip:"Mọi enemy, item, projectile đều nên là Prefab — không bao giờ drag trực tiếp vào Scene."},

  {sec:'basics', cat:'go', step:'Bước 2', name:'Tag & Layer',
   def:"Tag: nhãn string gắn vào GameObject để tìm kiếm ('Player', 'Enemy', 'Item'). Layer: nhóm số nguyên dùng cho Physics (ai va chạm với ai) và Camera Culling (camera render layer nào).",

  {sec:'basics', cat:'go', step:'Bước 2', name:'Hierarchy',
   def:'Cửa sổ hiển thị cây tất cả GameObject trong Scene hiện tại. Quan hệ parent–child thể hiện qua indent. Object con kế thừa transform của cha — di chuyển cha sẽ kéo con theo.',
   code:`// Cấu trúc Hierarchy gợi ý cho RPG:
// --- Managers (empty, DontDestroyOnLoad)

//     Player | Enemies

   tip:"Giữ Hierarchy gọn ngay từ đầu — sau 3 tháng không làm sẽ không hiểu scene của chính mình."},

  {sec:'basics', cat:'code', step:'Bước 3', name:'MonoBehaviour',
   def:'Class C# cơ sở để viết script gắn vào GameObject. Khi tạo script mới trong Unity, nó tự kế thừa MonoBehaviour. Cung cấp các magic method như Start(), Update(), OnCollisionEnter2D()...',
   code:`using UnityEngine;

public class PlayerController : MonoBehaviour {
    // Chạy 1 lần khi object khởi tạo (trước Start):
    void Awake() { }

    // Chạy 1 lần sau Awake, khi object được enable:
    void Start() { }

    // Chạy mỗi frame:
    void Update() { }
}`,
   tip:"Awake() để khởi tạo nội bộ (GetComponent). Start() để kết nối với object khác."},

  {sec:'basics', cat:'code', step:'Bước 3', name:'Lifecycle (thứ tự thực thi)',
   def:'Unity gọi các method theo thứ tự cố định mỗi frame. Biết thứ tự này giúp tránh bug object chưa sẵn sàng khi được gọi. Quan trọng nhất: Awake → Start → Update → LateUpdate.',
   code:`// THỨ TỰ TRONG MỘT FRAME:
// 1. Awake()       — khởi tạo, luôn chạy dù disabled
// 2. OnEnable()    — khi object được bật
// 3. Start()       — frame đầu tiên, sau tất cả Awake
// 4. FixedUpdate() — vật lý, cố định 50 lần/giây
// 5. Update()      — logic, mỗi frame
// 6. LateUpdate()  — sau Update (camera follow ở đây!)
// 7. OnDisable()   — khi object bị tắt
// 8. OnDestroy()   — khi object bị xoá`,
   tip:"Camera follow LUÔN đặt trong LateUpdate() — tránh jitter khi nhân vật di chuyển trong Update()."},

  {sec:'basics', cat:'code', step:'Bước 3', name:'SerializeField & Inspector',
   def:'[SerializeField] cho phép hiển thị biến private trong Inspector để chỉnh mà không cần public. Là cách chính để config giá trị (speed, damage, prefab reference) mà không hard-code.',
   code:`public class Enemy : MonoBehaviour {
    [SerializeField] float moveSpeed = 3f;
    [SerializeField] int maxHealth = 100;
    [SerializeField] GameObject lootPrefab;

    [Header("Combat")]
    [SerializeField] float attackRange = 1.5f;
    [SerializeField] int damage = 10;
}`,
   tip:"Không bao giờ dùng public chỉ để thấy trong Inspector — luôn dùng [SerializeField] private."},

  {sec:'basics', cat:'code', step:'Bước 3', name:'Time.deltaTime',
   def:'Thời gian (giây) của frame vừa rồi — khoảng 0.016s ở 60fps. Nhân vào mọi giá trị liên quan đến thời gian trong Update() để movement/animation đồng đều bất kể FPS.',
   code:`// SAI — nhanh chậm tuỳ FPS máy:
transform.position += Vector3.right * speed;

// ĐÚNG — đồng đều mọi máy:
transform.position += Vector3.right * speed * Time.deltaTime;

// Đếm thời gian:
timer += Time.deltaTime;
if (timer >= cooldown) { Attack(); timer = 0f; }`,
   tip:"Mọi giá trị trong Update() liên quan đến di chuyển đều phải nhân Time.deltaTime."},

  {sec:'basics', cat:'code', step:'Bước 3', name:'Coroutine',
   def:"Hàm có thể 'tạm dừng' giữa chừng và tiếp tục sau — dùng để làm delay, animation sequence, load async mà không block main thread. Dùng yield return để chờ.",
   code:`IEnumerator FlashRed() {
    sr.color = Color.red;
    yield return new WaitForSeconds(0.1f);
    sr.color = Color.white;
    yield return new WaitForSeconds(0.1f);
    sr.color = Color.red;
}

// Gọi:
StartCoroutine(FlashRed());`,
   tip:"Coroutine lý tưởng cho: hit flash, spawn delay, cutscene sequence, loading screen."},

  {sec:'basics', cat:'code', step:'Bước 3', name:'ScriptableObject',
   def:'Class lưu data thuần tuý, không gắn vào GameObject — lưu thành file .asset trong Project. Lý tưởng để lưu Item, Spell, CharacterClass, EnemyStats. Thay đổi không mất khi Play Mode.',
   code:`[CreateAssetMenu(menuName = "RPG/Item")]

// Dùng: [SerializeField] ItemData swordData;`,
   tip:"Toàn bộ data DnD (spell, class, race, monster) → ScriptableObject. Không hard-code."},

  {sec:'basics', cat:'asset', step:'Bước 1', name:'Project window & folder structure',
   def:'Cửa sổ hiển thị tất cả file trong project. Unity quan tâm đến một số folder đặc biệt như Resources/, Editor/, Plugins/. Tổ chức folder ngay từ đầu là bắt buộc.',

  _Game/           // underscore = lên đầu danh sách
    Art/
      Sprites/ | Tilesets/
    Audio/
    Prefabs/
    ScriptableObjects/

      Characters/ | Combat/ | UI/
    Settings/`,

  {sec:'basics', cat:'asset', step:'Bước 1', name:'Asset import settings',
   def:'Khi kéo file vào Project, Unity import và tạo metadata (.meta). Với sprite: cần set Sprite Mode, Pixels Per Unit, Filter Mode. Sai import settings = sprite bị mờ hoặc sai kích thước.',

// Generate Mip Maps: TẮT cho 2D`,
   tip:"Bật 'Point' filter cho pixel art — Bilinear làm mờ pixel, mất đi phong cách retro."},

  {sec:'basics', cat:'asset', step:'Bước 1', name:'Package Manager',
   def:'Cửa sổ cài/gỡ Unity package chính thức. Đây là nơi thêm Cinemachine, Input System, Tilemap, 2D Animation, TextMeshPro... Mở bằng Window > Package Manager.',
   code:`// Các package cần cài ngay cho isometric RPG:

  {sec:'basics', cat:'asset', step:'Bước 2', name:'Meta file',
   def:'Mỗi file trong Project đều có file .meta đi kèm — lưu GUID và import settings. Khi dùng Git, PHẢI commit cả .meta. Mất .meta = Unity mất reference đến asset.',
   code:`// .gitignore cho Unity project:
[Ll]ibrary/
[Tt]emp/
[Oo]bj/
[Bb]uild/

  {sec:'basics', cat:'asset', step:'Bước 3', name:'Build Settings & Platform',
   def:'Window > Build Settings — nơi chọn platform target (PC, Android, iOS, WebGL) và cấu hình build. Phải Switch Platform trước khi build cho platform mới — quá trình này reimport asset, mất vài phút.',
   code:`// Mở Build Settings: Ctrl+Shift+B

   tip:"Thêm tất cả scene vào Build Settings ngay từ đầu — quên thêm scene là bug khó debug nhất."},

  // ── PHẦN 2 ──────────────────────────────────────────────────────
  {sec:'iso', cat:'cam', step:'Camera', name:'Isometric projection',
   def:'Kỹ thuật render 3D lên màn hình 2D bằng cách nghiêng camera ở góc cố định — thường 45° ngang và 30° dọc (hoặc 26.57° cho pixel-perfect). Không có perspective distortion: vật xa không nhỏ hơn vật gần.',
   code:`Camera.main.transform.rotation =
    Quaternion.Euler(30f, 45f, 0f);
Camera.main.orthographic = true; // BẮT BUỘC`,
   tip:"Mọi game isometric kinh điển (Baldur's Gate, Diablo) đều dùng orthographic projection."},

  {sec:'iso', cat:'cam', step:'Camera', name:'Orthographic camera',
   def:'Camera không có perspective — vật ở xa và vật ở gần có cùng kích thước trên màn hình. Bắt buộc dùng cho isometric 2D để giữ tile thẳng hàng đúng.',
   code:`// Trong Inspector: Camera > Projection = Orthographic
// Orthographic Size = bán kính dọc của viewport
cam.orthographicSize = 5f;`,
   tip:"Nếu dùng Perspective camera, tiles sẽ bị vênh và không khớp nhau."},

  {sec:'iso', cat:'cam', step:'Camera', name:'Camera follow (Cinemachine)',
   def:'Cinemachine là package Unity cho phép camera tự động theo dõi target với damping, dead zone, confiner. Dùng Virtual Camera thay vì code camera tay.',
   code:`// Package: com.unity.cinemachine
// Add CinemachineVirtualCamera lên scene
// Target: gán Transform của nhân vật
// Body: Framing Transposer
// Lens Ortho Size: điều chỉnh zoom`,
   tip:"Tuyệt đối không tự viết camera follow — Cinemachine xử lý smooth, shake, confiner sẵn."},

  {sec:'iso', cat:'cam', step:'Camera', name:'Orthographic size',
   def:'Nửa chiều cao của viewport tính bằng Unity world units. Ví dụ: ortho size = 5 nghĩa là camera thấy 10 units dọc. Đây là cách zoom trong isometric.',
   code:`float zoomSpeed = 2f;
cam.orthographicSize -= Input.mouseScrollDelta.y * zoomSpeed;
cam.orthographicSize = Mathf.Clamp(cam.orthographicSize, 3f, 10f);`,
   tip:"Với isometric RPG, ortho size khoảng 4–7 thường là sweet spot cho góc nhìn chiến thuật."},

  {sec:'iso', cat:'tile', step:'Tilemap', name:'Tilemap (Isometric)',
   def:"Component Unity cho phép đặt tile lên lưới. Có 2 loại isometric: Isometric (không stagger) và Isometric Z as Y (tile chồng lên nhau theo chiều Z — dùng cái này cho RPG có độ cao).",
   code:`// Grid component: Cell Layout = Isometric Z As Y
// Cell Size: thường (1, 0.5, 1) cho pixel art 64x32
// Thêm nhiều Tilemap layer:
//   Ground, Wall, Object, Overlay`,
   tip:"'Isometric Z as Y' là chế độ đúng cho game RPG có building và object có chiều cao."},

  {sec:'iso', cat:'tile', step:'Tilemap', name:'Tile Palette',
   def:'Cửa sổ editor của Unity để vẽ tile lên Tilemap. Giống Photoshop nhưng cho bản đồ game — chọn brush, pick tile, paint trực tiếp lên Scene view.',
   code:`// Window > 2D > Tile Palette
// Kéo sprite vào Palette để tạo Tile asset
// Dùng Shift+click để paint rectangle
// Alt+click để pick tile đang có trên map`,
   tip:"Hầu hết thời gian làm map bạn sẽ ở đây — làm quen sớm."},

  {sec:'iso', cat:'tile', step:'Tilemap', name:'Rule Tile',
   def:'Loại tile đặc biệt tự chọn sprite dựa trên các tile xung quanh. Tường tự biết vẽ góc, cạnh, hay đoạn thẳng mà không cần paint tay từng tile.',
   code:`// Create > 2D > Tiles > Rule Tile
// Định nghĩa rules:
//   neighbor = This Tile → sprite A
//   neighbor = Not This Tile → sprite B
// Rất mạnh cho terrain tự động (cỏ, nước, tường)`,
   tip:"Rule Tile cắt giảm 80% công việc paint map lặp đi lặp lại."},

  {sec:'iso', cat:'tile', step:'Tilemap', name:'Composite Collider 2D',
   def:'Merge tất cả collider của các tile trong Tilemap thành một collider lớn duy nhất. Tăng performance đáng kể — thay vì 1000 box collider riêng lẻ, chỉ còn 1 composite.',
   code:`// Thêm TilemapCollider2D lên Tilemap
// Thêm CompositeCollider2D lên cùng object
// TilemapCollider2D > Used By Composite = true
// Rigidbody2D > Body Type = Static`,
   tip:"Bắt buộc cho Wall/Ground tilemap — không dùng composite thì game lag nặng."},

  {sec:'iso', cat:'sort', step:'Sorting', name:'Sorting layer',
   def:'Nhóm render thứ tự lớn — quyết định cái gì vẽ trên cái gì ở mức cao nhất. Sorting layer khác nhau không bao giờ bị đè bởi Order in Layer.',
   code:`// Edit > Project Settings > Tags and Layers
// Tạo: Background, Ground, Object, Character, UI, Overlay
SpriteRenderer.sortingLayerName = "Character";`,
   tip:"Thiết lập sorting layers ngay khi bắt đầu project — thay đổi sau rất đau."},

  {sec:'iso', cat:'sort', step:'Sorting', name:'Order in Layer',
   def:'Thứ tự render trong cùng một Sorting Layer. Số lớn hơn = vẽ sau = ở trên. Đây là nơi xảy ra vấn đề Z-fighting trong isometric.',
   code:`// Trick isometric: gán dynamic dựa vào Y position
void Update() {
    sr.sortingOrder = Mathf.RoundToInt(-transform.position.y * 100);
}`,
   tip:"Đây là giải pháp kinh điển để object ở phía trước che object ở phía sau trong isometric."},

  {sec:'iso', cat:'sort', step:'Sorting', name:'Z-fighting / Sorting artifacts',
   def:'Hiện tượng hai sprite cùng sorting order bị nhấp nháy vì Unity không biết cái nào vẽ trước. Bug phổ biến nhất trong isometric — cần giải quyết sớm.',
   code:`// Nguyên nhân: 2 sprite có sortingOrder bằng nhau
// Fix 1: Dùng Y-position-based sorting (xem trên)
// Fix 2: TilemapRenderer > Mode = Individual
// Fix 3: Sprite Atlas để giảm draw call đồng thời`,
   tip:"Trong isometric, mọi object có chiều cao đều cần Y-sorting. Không có cách tránh."},

  {sec:'iso', cat:'sort', step:'Sorting', name:'Sprite Atlas',
   def:'Gộp nhiều sprite nhỏ thành một texture lớn. Giảm draw calls và fix sorting artifacts vì các sprite cùng atlas luôn render trong một batch.',
   code:`// Create > 2D > Sprite Atlas
// Kéo folder sprite vào Objects for Packing
// Enable: Include in Build
// Runtime: SpriteAtlas.GetSprite("spriteName")`,
   tip:"Với RPG có nhiều character/item sprite, Atlas giúp tăng FPS rõ rệt trên mobile."},

  {sec:'iso', cat:'coord', step:'Toạ độ', name:'World space vs Cell space',
   def:'World space là toạ độ Unity thực (Vector3 float). Cell space là toạ độ ô trên lưới Tilemap (Vector3Int). Hai hệ này khác nhau và cần convert qua lại liên tục.',
   code:`Grid grid = GetComponent<Grid>();

// World → Cell
Vector3Int cell = grid.WorldToCell(worldPos);

// Cell → World (tâm của ô)
Vector3 world = grid.GetCellCenterWorld(cell);`,
   tip:"Mọi logic game (click để move, đặt object, kiểm tra tile) đều cần convert này."},

  {sec:'iso', cat:'coord', step:'Toạ độ', name:'Isometric coordinates',
   def:'Trong Unity isometric tilemap, trục X và Y của cell KHÔNG phải là trục màn hình. Trục X đi theo hướng đông-bắc, trục Y đi theo hướng tây-bắc trên màn hình.',
   code:`// Tile tại cell (1,0,0) nằm bên PHẢI dưới
// Tile tại cell (0,1,0) nằm bên TRÁI dưới
// Tile tại cell (1,1,0) nằm TRỰC TIẾP phía dưới
// Vẽ sơ đồ ra giấy trước khi code pathfinding!`,
   tip:"Đây là nguồn gốc của 90% bug logic trong isometric game mới làm."},

  {sec:'iso', cat:'coord', step:'Toạ độ', name:'Z as Y (elevation)',
   def:'Trong Isometric Z as Y mode, trục Z của cell tương ứng với độ cao — tile ở Z=1 cao hơn Z=0. Unity dùng Y position thực tế để sort, nên elevation tự động ảnh hưởng sorting.',
   code:`// Tile ở tầng trệt: z = 0
// Tile ở tầng 1 (platform): z = 1
// Tile ở tầng 2: z = 2
// Grid.cellSize.z điều chỉnh offset giữa các tầng`,
   tip:"Hiểu Z as Y là chìa khoá làm map có nhiều tầng (dungeon, castle) đúng cách."},

  {sec:'iso', cat:'path', step:'Pathfinding', name:'NavMesh (2D alternative)',
   def:'NavMesh là hệ thống pathfinding 3D built-in của Unity — không phù hợp cho isometric 2D grid-based. Với RPG isometric dùng lưới ô, cần dùng A* Pathfinding Project hoặc tự implement.',
   code:`// KHÔNG dùng NavMesh cho isometric 2D grid
// Dùng: A* Pathfinding Project (free version đủ dùng)
// Hoặc: EasyAStarPathfinding trên Asset Store
// Hoặc: Tự implement A* trên grid nếu muốn học sâu`,
   tip:"NavMesh sẽ gây ra vô số vấn đề với isometric tilemap — đừng thử."},

  {sec:'iso', cat:'path', step:'Pathfinding', name:'A* algorithm (trên grid)',
   def:'Thuật toán tìm đường ngắn nhất trên lưới ô. Với isometric, mỗi cell là một node. A* dùng heuristic (thường là Manhattan distance) để ưu tiên hướng đến đích.',
   code:`// f(n) = g(n) + h(n)
// g(n): chi phí thực từ start đến node n
// h(n): ước tính heuristic từ n đến goal
// Manhattan distance:
// h = Mathf.Abs(dx) + Mathf.Abs(dy)`,
   tip:"Hiểu công thức này giúp bạn debug path sai và tune cho phép movement chéo."},

  {sec:'iso', cat:'path', step:'Pathfinding', name:'Walkable / Unwalkable tiles',
   def:'Mỗi tile trong A* grid có thuộc tính walkable (có thể đi qua) hay không. Wall, water, door đóng = unwalkable. Character = unwalkable tạm thời (dynamic obstacle).',
   code:`// A* Pathfinding Project: GraphUpdateScene
// Khi tile thay đổi (cửa mở):
AstarPath.active.UpdateGraphs(bounds);

// Dynamic obstacle: AIPath component
//   tự block tile mà nó đứng`,
   tip:"Thiết kế walkable data ngay từ đầu — liên quan trực tiếp đến Tilemap layer setup."},

  // ── PHẦN 3 ──────────────────────────────────────────────────────
  {sec:'stat', cat:'dnd', step:'Nền tảng', name:'Ability Score (6 chỉ số cơ bản)',
   def:'STR, DEX, CON, INT, WIS, CHA — 6 chỉ số gốc của mọi character trong DnD 5e. Giá trị từ 1–30, trung bình là 10–11. Tất cả các stat khác đều DERIVED (tính ra) từ 6 số này. Đây là data layer thấp nhất cần lưu.',
   code:`public int strength     = 10;
public int dexterity    = 10;
public int constitution = 10;
public int intelligence = 10;
public int wisdom       = 10;
public int charisma     = 10;`,
   tip:'Chỉ lưu 6 số gốc này — mọi thứ còn lại đều tính ra từ đây, không lưu trùng.'},

  {sec:'stat', cat:'dnd', step:'Nền tảng', name:'Ability Modifier',
   def:'Số cộng/trừ tính từ Ability Score. Công thức: floor((score - 10) / 2). Score 10 → modifier 0. Score 16 → modifier +3. Score 8 → modifier -1. Đây là con số thực sự dùng khi roll dice.',
   code:`public static int GetModifier(int score) {
    return Mathf.FloorToInt((score - 10) / 2f);
}
// STR 16 → modifier = +3
// DEX  8 → modifier = -1
// CON 14 → modifier = +2`,
   tip:'Nhớ dùng FloorToInt, không phải RoundToInt — score 9 cho modifier -1, không phải 0.'},

  {sec:'stat', cat:'dnd', step:'Nền tảng', name:'Proficiency Bonus (PB)',
   def:'Bonus cộng thêm khi character thành thạo (proficient) một kỹ năng, vũ khí, saving throw. Tính theo level: level 1–4 = +2, level 5–8 = +3, level 9–12 = +4... Tăng theo tier, không theo từng level.',
   code:`public static int GetProficiencyBonus(int level) {
    return 2 + Mathf.FloorToInt((level - 1) / 4f);
}
// Level 1  → PB = +2
// Level 5  → PB = +3
// Level 9  → PB = +4
// Level 17 → PB = +6`,
   tip:'PB áp dụng cho: attack roll với vũ khí thành thạo, skill check thành thạo, saving throw thành thạo.'},

  {sec:'stat', cat:'dnd', step:'Derived stats', name:'Armor Class (AC)',
   def:'Ngưỡng phòng thủ — attacker phải roll d20 + attack bonus >= AC thì mới trúng. Công thức cơ bản: 10 + DEX modifier. Mặc giáp thay đổi công thức. Shield cộng +2.',
   code:`public int GetAC() {
    return 10 + GetModifier(dexterity);
}
// Leather armor: 11 + DEX mod
// Chain mail:    16 (không cộng DEX)
// Plate:         18 (không cộng DEX)
// + Shield:      +2 vào bất kỳ loại nào`,
   tip:'AC là stat được query nhiều nhất trong combat — nên cache lại, không tính mỗi lần bị đánh.'},

  {sec:'stat', cat:'dnd', step:'Derived stats', name:'Hit Points (HP) & Hit Dice',
   def:'HP tối đa = Hit Die của class + CON modifier, cộng thêm mỗi level. Fighter dùng d10, Wizard dùng d6. Level 1 HP = max die value + CON mod. Level 2+ HP = roll die (hoặc average) + CON mod.',
   code:`int conMod = GetModifier(constitution);
int maxHP  = hitDieMax + conMod
           + (level - 1) * (hitDieAverage + conMod);
// Fighter level 3, CON 14 (mod +2):
// maxHP = 10 + 2 + 2*(6+2) = 28`,
   tip:'Dùng average HP khi level lên cho game cân bằng hơn — random thường tạo character quá mạnh/yếu.'},

  {sec:'stat', cat:'dnd', step:'Derived stats', name:'Saving Throw',
   def:'Roll khi bị ép chịu hiệu ứng (độc, phép thuật, sợ hãi). Roll d20 + ability modifier, nếu proficient thì + PB. Mỗi class có 2 saving throw thành thạo: Fighter (STR + CON), Wizard (INT + WIS)...',
   code:`public int GetSavingThrow(AbilityType ability, bool proficient) {
    int mod = GetModifier(GetScore(ability));
    int pb  = proficient ? GetProficiencyBonus(level) : 0;
    return mod + pb;
}
int roll = Random.Range(1, 21);
bool success = (roll + savingThrow) >= difficultyClass;`,
   tip:'Lưu proficiency dưới dạng bool[] hoặc HashSet<AbilityType> trong CharacterClass SO.'},

  {sec:'stat', cat:'dnd', step:'Derived stats', name:'Skill Check & DC',
   def:'Roll d20 + ability modifier + PB (nếu proficient) vs Difficulty Class (DC). Perception dùng WIS, Athletics dùng STR, Stealth dùng DEX. DC chuẩn: Easy=10, Medium=15, Hard=20, Very Hard=25.',
   code:`var skillAbility = new Dictionary<Skill, AbilityType> {
    { Skill.Athletics,  AbilityType.STR },
    { Skill.Stealth,    AbilityType.DEX },
    { Skill.Perception, AbilityType.WIS },
    { Skill.Arcana,     AbilityType.INT },
};
// Spell Save DC = 8 + PB + spellcasting modifier`,
   tip:'Lưu skillProficiencies và skillExpertise dưới dạng HashSet<Skill> trong class/background SO.'},

  {sec:'stat', cat:'dnd', step:'Derived stats', name:'Initiative',
   def:'Thứ tự hành động trong combat. Mỗi combatant roll d20 + DEX modifier khi combat bắt đầu. Số cao hành động trước. Roll 1 lần khi encounter bắt đầu, giữ nguyên suốt trận.',
   code:`public int RollInitiative() {
    int roll   = Random.Range(1, 21);
    int dexMod = GetModifier(baseStats.dexterity);
    return initiative = roll + dexMod;
}
combatants.Sort((a, b) => b.initiative - a.initiative);`,
   tip:'Không re-roll initiative mỗi round — roll 1 lần khi combat bắt đầu, giữ nguyên.'},

  {sec:'stat', cat:'so', step:'Data layer', name:'CharacterStatsSO',
   def:'ScriptableObject lưu toàn bộ base stats của một character (hoặc monster). Là template dữ liệu bất biến — không phải instance trong scene. Mỗi Fighter, Goblin, Dragon có 1 file .asset riêng.',
   code:`[CreateAssetMenu(menuName = "RPG/Character Stats")]
public class CharacterStatsSO : ScriptableObject {
    [Header("Identity")]
    public string characterName;
    public int    level = 1;

    [Header("Ability Scores")]
    public int strength = 10, dexterity = 10;
    public int constitution = 10, intelligence = 10;
    public int wisdom = 10, charisma = 10;
}`,
   tip:'Dùng OnValidate() để tự tính derived stats ngay trong Editor mỗi khi bạn thay đổi số.'},

  {sec:'stat', cat:'so', step:'Data layer', name:'ClassDataSO',
   def:'ScriptableObject lưu đặc điểm của một Class — Hit Die, saving throw proficiencies, skill proficiency slots, class features theo level. Tách riêng khỏi CharacterStats để reuse và dễ balance.',
   code:`[CreateAssetMenu(menuName = "RPG/Class Data")]
public class ClassDataSO : ScriptableObject {
    public string      className;
    public int         hitDie = 10;
    public AbilityType[] savingThrowProficiencies;
    public int         skillChoices = 2;
    public Skill[]     availableSkills;
    public ClassFeature[] features;
}`,
   tip:'Sau này bạn có thể tạo Paladin bằng cách combine ClassDataSO Fighter + Cleric — rất linh hoạt.'},

  {sec:'stat', cat:'so', step:'Data layer', name:'RaceDataSO',
   def:'ScriptableObject lưu racial traits — ability score bonuses, speed, darkvision, racial features. Ví dụ: Half-Orc +2 STR +1 CON, Human +1 tất cả. Áp dụng lên base stats khi tính derived stats.',
   code:`[CreateAssetMenu(menuName = "RPG/Race Data")]
public class RaceDataSO : ScriptableObject {
    public string raceName;
    public int    baseSpeed = 30;
    public bool   hasDarkvision;
    public AbilityScoreIncrease[] bonuses;
}
[System.Serializable]
public struct AbilityScoreIncrease {
    public AbilityType ability;
    public int         bonus;
}`,
   tip:'Race và Class là 2 SO riêng — không merge vào CharacterStats. Dễ thêm Subrace sau này.'},

  {sec:'stat', cat:'so', step:'Data layer', name:'OnValidate()',
   def:'Method đặc biệt của Unity — tự động gọi trong Editor mỗi khi bạn thay đổi giá trị trong Inspector. Dùng để tính derived stats (HP, AC, PB) ngay lập tức mà không cần chạy game.',
   code:`private void OnValidate() {
    int conMod = Mathf.FloorToInt((constitution - 10) / 2f);
    int pb     = 2 + Mathf.FloorToInt((level - 1) / 4f);

    maxHP = hitDie + conMod
          + (level - 1) * (hitDieAverage + conMod);
    armorClass       = 10 + Mathf.FloorToInt((dexterity - 10) / 2f);
    proficiencyBonus = pb;
}`,
   tip:'OnValidate() chỉ chạy trong Editor — không dùng để tính runtime. Dùng riêng hàm tính stat.'},

  {sec:'stat', cat:'arch', step:'Runtime', name:'CharacterSheet (runtime component)',
   def:'MonoBehaviour gắn vào GameObject trong Scene — giữ trạng thái HIỆN TẠI (HP còn lại, buff/debuff đang active, equipment đang mặc). Khác với CharacterStatsSO là template bất biến.',
   code:`public class CharacterSheet : MonoBehaviour {
    [SerializeField] CharacterStatsSO baseStats;
    [SerializeField] ClassDataSO      classData;
    [SerializeField] RaceDataSO       raceData;

    public int currentHP;
    public List<StatModifier> activeModifiers = new();

    void Awake() { currentHP = GetMaxHP(); }

    public int GetMaxHP() { /* tính từ SO */ }
    public int GetAC()    { /* base + modifiers */ }
}`,
   tip:'CharacterSheet là "brain" runtime. SO là "blueprint". Tách 2 thứ này rõ ràng — không trộn lẫn.'},

  {sec:'stat', cat:'arch', step:'Runtime', name:'Stat layer separation',
   def:'Kiến trúc 3 tầng: (1) Base stats từ SO — không đổi. (2) Modifier layer — buff/debuff/equipment cộng thêm. (3) Final value — kết quả cuối tính realtime. Không bao giờ ghi thẳng vào base stats.',
   code:`// Tầng 1 — Base (SO, bất biến):
int baseSTR = baseStats.strength; // 16

// Tầng 3 — Final (tính khi cần):
public int GetFinalSTR() {
    int total = baseStats.strength;
    foreach (var mod in activeModifiers)
        if (mod.stat == StatType.STR)
            total += mod.value;
    return Mathf.Clamp(total, 1, 30);
}`,
   tip:'Không bao giờ ghi baseStats.strength += 2. Luôn thêm Modifier vào list, tính final khi query.'},

  {sec:'stat', cat:'calc', step:'Tính toán', name:'Attack Roll',
   def:'Cơ chế đánh cơ bản: roll d20 + ability modifier + PB (nếu proficient với vũ khí). So với AC của target. Roll >= AC = trúng. Roll 20 tự nhiên = Critical Hit. Roll 1 tự nhiên = auto miss.',
   code:`public AttackResult RollAttack(CharacterSheet target) {
    int d20     = Random.Range(1, 21);
    bool crit   = (d20 == 20);
    bool fumble = (d20 == 1);
    int strMod  = GetModifier(baseStats.strength);
    int pb      = IsProficientWith(weapon) ? proficiencyBonus : 0;
    int total   = d20 + strMod + pb;
    bool hit    = !fumble && (crit || total >= target.GetAC());
    return new AttackResult { hit=hit, critical=crit };
}`,
   tip:'Natural 1 = auto miss, Natural 20 = auto hit + crit — bất kể modifier. Đây là rule cứng.'},

  {sec:'stat', cat:'calc', step:'Tính toán', name:'Damage Roll',
   def:'Sau khi attack hit: roll damage dice + ability modifier. Ví dụ: Short Sword = 1d6 + STR mod. Critical Hit = roll gấp đôi số dice (2d6 + STR mod), KHÔNG nhân đôi modifier. Resistance = chia 2.',
   code:`public int RollDamage(bool isCritical) {
    int diceCount = isCritical ? weapon.diceCount * 2
                               : weapon.diceCount;
    int damage = 0;
    for (int i = 0; i < diceCount; i++)
        damage += Random.Range(1, weapon.diceSides + 1);
    damage += GetModifier(baseStats.strength);
    return Mathf.Max(1, damage); // minimum 1
}`,
   tip:'Critical = nhân đôi số dice TRƯỚC khi roll, không nhân đôi tổng — sự khác biệt quan trọng.'},

  {sec:'stat', cat:'pat', step:'Pattern', name:'Modifier Pattern (IStatModifier)',
   def:'Interface cho mọi thứ có thể thay đổi stat — equipment, buff, debuff, spell, condition. Dùng List<IStatModifier> trong CharacterSheet. Thêm/xoá modifier mà không đụng vào base stats.',
   code:`public interface IStatModifier {
    StatType  TargetStat   { get; }
    ModType   ModifierType { get; } // Flat, Percent, Override
    int       Value        { get; }
    float     Duration     { get; } // -1 = permanent
}
// Bless spell (+1d4):
public class BlessModifier : IStatModifier {
    public StatType  TargetStat   => StatType.AttackRoll;
    public ModType   ModifierType => ModType.Flat;
    public int       Value        => Random.Range(1, 5);
    public float     Duration     => 60f;
}`,
   tip:'Modifier Pattern là lý do bạn không nên hard-code stat. Sau này thêm Curse, Rage, Haste mà không refactor.'},

  {sec:'stat', cat:'pat', step:'Pattern', name:'Observer / C# Event cho stat',
   def:'Khi stat thay đổi (HP giảm, buff hết hạn), dùng C# event để notify UI và các system khác tự cập nhật. Không polling mỗi frame. Không kết nối cứng CharacterSheet với HealthBar.',
   code:`public class CharacterSheet : MonoBehaviour {
    public event Action<int, int> OnHPChanged; // (current, max)
    public event Action<int>      OnLevelUp;
    public event Action           OnDeath;

    public void TakeDamage(int amount) {
        currentHP = Mathf.Max(0, currentHP - amount);
        OnHPChanged?.Invoke(currentHP, GetMaxHP());
        if (currentHP == 0) OnDeath?.Invoke();
    }
}`,
   tip:'Dùng ?. (null-conditional) khi invoke event — tránh NullReferenceException nếu không ai subscribe.'},

  {sec:'stat', cat:'pat', step:'Pattern', name:'Enum AbilityType & StatType',
   def:'Dùng enum thay vì string để đại diện cho loại stat. Tránh typo, IDE tự gợi ý, compiler bắt lỗi. Định nghĩa trước khi viết bất kỳ stat code nào — dùng xuyên suốt toàn bộ hệ thống.',
   code:`public enum AbilityType { STR, DEX, CON, INT, WIS, CHA }

public enum StatType {
    STR, DEX, CON, INT, WIS, CHA,
    MaxHP, CurrentHP, AC,
    AttackRoll, DamageRoll,
    SpellSaveDC, Initiative, Speed
}

public enum ModType { Flat, Percent, Override }`,
   tip:'Định nghĩa enum này trước khi viết bất kỳ stat code nào — dùng xuyên suốt toàn bộ hệ thống.'},

  {sec:'stat', cat:'pat', step:'Pattern', name:'DontDestroyOnLoad cho party data',
   def:'Party của player (4 character + inventory + gold + quest state) cần tồn tại khi chuyển Scene. DontDestroyOnLoad giữ GameObject sống qua Scene transition mà không bị xoá.',
   code:`public class PartyManager : MonoBehaviour {
    public static PartyManager Instance { get; private set; }

    void Awake() {
        if (Instance != null) { Destroy(gameObject); return; }
        Instance = this;
        DontDestroyOnLoad(gameObject);
    }

    public List<CharacterSheet> partyMembers = new();
    public int gold = 0;
}`,
   tip:'Singleton + DontDestroyOnLoad là pattern chuẩn cho GameManager, AudioManager, PartyManager.'},

  // ── PHẦN 4 ──────────────────────────────────────────────────────
  {sec:'combat', cat:'turn', step:'Core', name:'Encounter & Combat loop',
   def:'Toàn bộ một trận đánh được gọi là Encounter. Gồm 3 giai đoạn lặp: (1) Initiative Phase — roll và sắp xếp thứ tự. (2) Round — mỗi combatant đi 1 lần theo thứ tự. (3) Round kết thúc khi tất cả đã đi, lặp lại đến khi có bên thua.',
   code:`public enum CombatPhase {
    OutOfCombat,
    InitiativePhase,   // roll + sort
    PlayerTurn,
    EnemyTurn,
    RoundEnd,
    CombatEnd
}
// StartEncounter() → RollAllInitiative()
//   → loop: NextTurn() → ResolveTurn()
//   → CheckEndCondition() → NextTurn()...`,
   tip:'Tách rõ 3 giai đoạn ngay từ đầu — nhiều bug combat xuất phát từ việc nhập nhèm initiative và turn.'},

  {sec:'combat', cat:'turn', step:'Core', name:'Initiative order & Queue',
   def:'Sau khi roll initiative, sắp xếp tất cả combatant vào một danh sách thứ tự. Dùng List với index để duyệt vòng lặp. Hết list = hết 1 round, bắt đầu lại từ đầu.',
   code:`combatants.Sort((a, b) => {
    int diff = b.initiative - a.initiative;
    if (diff != 0) return diff;
    return b.GetDEXMod() - a.GetDEXMod(); // tie-break
});
int currentIndex = 0;
public Combatant GetCurrentTurn() => combatants[currentIndex];
public void AdvanceTurn() {
    currentIndex = (currentIndex + 1) % combatants.Count;
    if (currentIndex == 0) OnRoundEnd?.Invoke(roundNumber++);
}`,
   tip:'Dùng List + index thay vì Queue — dễ hiển thị turn order UI và insert combatant mới (summon) vào giữa.'},

  {sec:'combat', cat:'turn', step:'Core', name:'Round vs Turn phân biệt',
   def:'Round: 1 vòng đầy đủ trong đó mọi combatant đều hành động 1 lần — tương đương 6 giây trong lore. Turn: lượt của 1 combatant cụ thể trong 1 round. Một số effect tính theo round, một số tính theo turn.',
   code:`// Duration của effect:
// "1 round"  = hết hiệu lực ở đầu turn TỚI của caster
// "1 minute" = 10 rounds
// "Concentration" = caster maintain mỗi turn
public class CombatTimer {
    public int roundNumber = 1;  // tăng sau mỗi round
    public int turnCount   = 0;  // tăng sau mỗi turn
}`,
   tip:'"Lasts until the start of your next turn" khác "lasts 1 round" — phân biệt rõ để tính duration đúng.'},

  {sec:'combat', cat:'turn', step:'Core', name:'Combatant wrapper (runtime)',
   def:'Class bọc quanh CharacterSheet cho mục đích combat — lưu trạng thái trong trận (has acted, has used bonus action, reaction available). Tách riêng khỏi CharacterSheet để không làm bẩn data gốc.',
   code:`public class Combatant {
    public CharacterSheet sheet;
    public int  initiative;
    public bool isPlayer;
    // Reset mỗi đầu turn:
    public bool hasAction      = true;
    public bool hasBonusAction = true;
    public bool hasReaction    = true;
    public int  movementLeft;
    public void ResetTurn() {
        hasAction = hasBonusAction = hasReaction = true;
        movementLeft = sheet.GetSpeed();
    }
}`,
   tip:'Reset tất cả action resource ở đầu mỗi turn — đừng để logic reset nằm rải rác khắp nơi.'},

  {sec:'combat', cat:'action', step:'Core', name:'Action / Bonus Action / Reaction',
   def:'Mỗi turn có đúng: 1 Action (đánh, cast spell, Dash, Disengage...), 1 Bonus Action (nếu có ability dùng BA), 1 Reaction (dùng ngoài turn — opportunity attack, Shield spell, Counterspell). Dùng xong là mất đến turn sau.',
   code:`public enum ActionType {
    Action, BonusAction, Reaction, FreeAction,
    LegendaryAction // boss — dùng sau turn người khác
}
public bool CanUse(ActionType type) => type switch {
    ActionType.Action      => hasAction,
    ActionType.BonusAction => hasBonusAction,
    ActionType.Reaction    => hasReaction,
    _ => true
};`,
   tip:'Reaction là cái khó nhất — trigger ngoài turn, cần event system riêng. Implement Reaction sau cùng.'},

  {sec:'combat', cat:'action', step:'Core', name:'Movement & Speed',
   def:'Mỗi turn, character có Speed feet để di chuyển (thường 30ft). Có thể chia nhỏ: đi 15ft, đánh, đi thêm 15ft. Dash Action nhân đôi movement. Difficult terrain tiêu thụ 2ft per 1ft di chuyển.',
   code:`public void TryMove(Vector3Int targetCell) {
    float dist = GetIsometricDistance(currentCell, targetCell);
    float cost = IsDifficultTerrain(targetCell) ? dist*2 : dist;
    if (cost > movementLeft) { ShowError("Không đủ movement"); return; }
    movementLeft -= cost;
    MoveTo(targetCell);
}
// 1 tile Unity = 5 feet DnD
// Speed 30ft = 6 ô trên grid`,
   tip:'Map 1 tile = 5 feet từ đầu. Mọi spell range, movement, AoE đều tính theo đơn vị này.'},

  {sec:'combat', cat:'action', step:'Core', name:'Opportunity Attack',
   def:'Reaction đặc biệt: khi enemy rời khỏi melee range (5ft) mà không dùng Disengage, bạn được đánh 1 đòn miễn phí. Trigger khi enemy kết thúc movement ra ngoài reach.',
   code:`void OnCombatantMoved(Combatant mover, Vector3Int from, Vector3Int to) {
    foreach (var c in GetAdjacentCombatants(from)) {
        if (c.isEnemy(mover) && !c.IsInRange(to, 5f)
            && c.hasReaction && !mover.usedDisengage) {
            c.TriggerOpportunityAttack(mover);
            c.hasReaction = false;
        }
    }
}`,
   tip:'Opportunity Attack là lý do Disengage Action tồn tại — implement cả 2 cùng lúc.'},

  {sec:'combat', cat:'action', step:'Core', name:'Help / Disengage / Dodge / Dash',
   def:'4 Action cơ bản không phải đánh: Dash (nhân đôi movement), Disengage (tránh OA khi rút), Dodge (attacker có disadvantage), Help (cho ally advantage trên attack/skill).',
   code:`public void UseAction(StandardAction action) {
    switch (action) {
        case StandardAction.Dash:
            movementLeft += sheet.GetSpeed(); break;
        case StandardAction.Disengage:
            usedDisengage = true; break;
        case StandardAction.Dodge:
            isDodging = true; break;
        case StandardAction.Help:
            helpTarget.grantedAdvantage = true; break;
    }
    hasAction = false;
}`,
   tip:'Implement 4 action này trước khi làm spell — chúng test hầu hết logic combat cơ bản.'},

  {sec:'combat', cat:'action', step:'Advanced', name:'Advantage & Disadvantage',
   def:'Advantage: roll 2d20, lấy cao hơn. Disadvantage: roll 2d20, lấy thấp hơn. Advantage và Disadvantage luôn triệt tiêu nhau — dù có 3 nguồn advantage và 1 nguồn disadvantage, kết quả vẫn là straight roll.',
   code:`public int RollD20WithAdvantage(AdvantageState state) {
    int r1 = Random.Range(1, 21);
    int r2 = Random.Range(1, 21);
    return state switch {
        AdvantageState.Advantage    => Mathf.Max(r1, r2),
        AdvantageState.Disadvantage => Mathf.Min(r1, r2),
        _                           => r1
    };
}
public enum AdvantageState { Normal, Advantage, Disadvantage }`,
   tip:'Advantage/Disadvantage luôn triệt tiêu — không stack. Lưu 2 counter rồi so sánh để quyết định.'},

  {sec:'combat', cat:'spell', step:'Framework', name:'SpellSO (base class)',
   def:'ScriptableObject base cho mọi spell. Lưu metadata (tên, level, school, range, casting time, duration) và abstract method Execute(). Mỗi spell cụ thể override Execute() với logic riêng — đây là cơ chế "brew" spell.',
   code:`public abstract class SpellSO : ScriptableObject {
    public string      spellName;
    public int         spellLevel;    // 0 = cantrip
    public MagicSchool school;
    public CastingTime castingTime;   // Action, BonusAction, Reaction
    public int         range;         // feet; 0=Self, -1=Touch
    public bool        requiresConcentration;
    public DurationType durationType;
    public float        durationValue;
    // Override trong mỗi spell:
    public abstract void Execute(Combatant caster,
                                 SpellTarget target, int slotLevel);
}`,
   tip:'Abstract Execute() là chìa khoá brew spell — tạo FireballSO, HealSO chỉ cần override 1 method.'},

  {sec:'combat', cat:'spell', step:'Framework', name:'Spell Slot system',
   def:'Wizard/Cleric có spell slots cấp 1–9. Upcasting: dùng slot cấp cao hơn để tăng hiệu quả (Fireball slot cấp 4 = thêm 1d6 damage). Short Rest restore Warlock slots. Long Rest restore tất cả.',
   code:`public class SpellSlotTracker {
    private int[] slots = new int[9]; // index 0 = level 1
    public bool TryCastSpell(SpellSO spell, int slotLevel) {
        if (slotLevel < spell.spellLevel) return false;
        if (slots[slotLevel - 1] <= 0)   return false;
        slots[slotLevel - 1]--;
        spell.Execute(caster, target, slotLevel);
        return true;
    }
    public void LongRest(ClassDataSO cd) {
        slots = cd.GetSlotsByLevel(level);
    }
}`,
   tip:'Build Short Rest và Long Rest riêng biệt ngay từ đầu — chúng restore resource khác nhau tùy class.'},

  {sec:'combat', cat:'spell', step:'Framework', name:'SpellTarget (targeting)',
   def:'Mỗi spell cần biết mục tiêu: Single target, Self, AoE (Sphere/Cone/Line/Cube), hoặc Touch. SpellTarget là struct truyền vào Execute() để spell biết tác động lên ai.',
   code:`public enum TargetType { Self, Single, Touch,
    AreaSphere, AreaCone, AreaLine, AreaCube }

public struct SpellTarget {
    public Combatant       singleTarget;
    public Vector3         areaOrigin;
    public float           areaRadius;
    public List<Combatant> resolvedTargets;
}
// Resolve target TRƯỚC Execute:
SpellTarget t = TargetResolver.Resolve(spell, clickedCell);
spell.Execute(caster, t, slotLevel);`,
   tip:'Resolve target trước Execute — tách "ai bị ảnh hưởng" ra khỏi "hiệu ứng gì xảy ra".'},

  {sec:'combat', cat:'spell', step:'Framework', name:'Concentration',
   def:'Một số spell yêu cầu Concentration để duy trì (Hold Person, Bless, Fly...). Caster chỉ concentrate 1 spell tại 1 thời điểm. Khi bị damage phải pass CON saving throw (DC = max(10, damage/2)) hoặc mất concentration.',
   code:`public class ConcentrationTracker {
    public SpellSO activeSpell { get; private set; }
    public void StartConcentration(SpellSO spell) {
        EndConcentration(); // hủy spell cũ trước
        activeSpell = spell;
    }
    public void OnTakeDamage(int damage) {
        int dc   = Mathf.Max(10, damage / 2);
        int roll = Random.Range(1,21) + caster.GetCONSave();
        if (roll < dc) EndConcentration();
    }
    public void EndConcentration() {
        activeSpell?.OnConcentrationEnd(caster);
        activeSpell = null;
    }
}`,
   tip:'Concentration buộc player phải chọn lựa chiến lược — đừng bỏ qua, nó tạo ra quyết định chiến thuật hay.'},

  {sec:'combat', cat:'cstate', step:'Condition', name:'Condition (trạng thái đặc biệt)',
   def:'Các trạng thái ảnh hưởng đặc biệt: Blinded, Charmed, Frightened, Grappled, Incapacitated, Paralyzed, Poisoned, Prone, Restrained, Stunned, Unconscious. Mỗi condition có rule riêng về movement, attack, saving throw.',
   code:`[Flags] public enum Condition {
    None          = 0,
    Blinded       = 1 << 0,  // attacks have disadvantage
    Charmed       = 1 << 1,  // can\'t attack charmer
    Frightened    = 1 << 2,  // disadvantage if source visible
    Grappled      = 1 << 3,  // speed = 0
    Incapacitated = 1 << 4,  // no Action/Reaction
    Paralyzed     = 1 << 5,  // incap + auto-crit in melee
    Poisoned      = 1 << 6,  // disadvantage attack/ability
    Prone         = 1 << 7,  // melee adv, ranged disadv
    Stunned       = 1 << 8,  // incap + auto-crit in melee
}`,
   tip:'Dùng [Flags] enum để stack condition — 1 combatant có thể bị Blinded AND Poisoned cùng lúc.'},

  {sec:'combat', cat:'cstate', step:'Condition', name:'ActiveEffect (runtime)',
   def:'Khi spell hoặc ability áp condition lên target, tạo ActiveEffect gắn vào Combatant — lưu loại effect, source, duration còn lại. Mỗi đầu turn tick duration xuống, hết duration thì tự xoá.',
   code:`public class ActiveEffect {
    public string      effectName;
    public Condition   appliedCondition;
    public StatModifier statModifier;
    public int         durationRounds; // -1 = permanent
    public Combatant   source;
    public bool Tick() { // gọi đầu mỗi turn của target
        if (durationRounds < 0) return false;
        durationRounds--;
        return durationRounds <= 0; // true = xoá đi
    }
}`,
   tip:'Tick effect ở đầu turn của TARGET (không phải caster) — đây là rule RAW của DnD 5e.'},

  {sec:'combat', cat:'cstate', step:'Condition', name:'Saving Throw để kháng effect',
   def:'Nhiều condition cho phép target roll saving throw để kháng hoặc kết thúc sớm. Ví dụ: Paralyzed (CON save cuối turn để thoát), Frightened (WIS save), Charmed (WIS save khi bị charmer tấn công).',
   code:`void TryEndConditionOnTurn(Combatant target, ActiveEffect fx) {
    if (fx.saveToEnd == null) return;
    int roll = Random.Range(1, 21)
             + target.sheet.GetSavingThrow(fx.saveAbility);
    if (roll >= fx.saveDC) {
        target.activeEffects.Remove(fx);
        target.conditions &= ~fx.appliedCondition;
        OnConditionRemoved?.Invoke(target, fx);
    }
}`,
   tip:'Một số condition tự kết thúc theo thời gian, một số cần save throw — lưu cả 2 cơ chế trong ActiveEffect.'},

  {sec:'combat', cat:'carch', step:'Pattern', name:'State Machine cho CombatManager',
   def:'Turn-based combat có nhiều trạng thái rõ ràng và transition cụ thể — State Machine là pattern hoàn hảo. Mỗi state (InitiativePhase, PlayerTurn, EnemyTurn...) là 1 class với Enter/Execute/Exit.',
   code:`public abstract class CombatState {
    protected CombatManager cm;
    public virtual void Enter()  { }
    public virtual void Execute(){ }
    public virtual void Exit()   { }
}
public class PlayerTurnState : CombatState {
    public override void Enter() {
        cm.CurrentCombatant.ResetTurn();
        UI.ShowActionPanel();
    }
    public override void Exit() {
        UI.HideActionPanel();
        cm.AdvanceTurn();
    }
}`,
   tip:'State Machine tránh "if combat phase == X then..." rải rác khắp code. Mỗi state tự biết việc của mình.'},

  {sec:'combat', cat:'carch', step:'Pattern', name:'Command Pattern cho action',
   def:'Mỗi action (Attack, CastSpell, Move, UseItem) đóng gói thành 1 ICommand với Execute() và Undo(). Dễ log, replay, và undo — quan trọng cho combat log UI và debug.',
   code:`public interface ICombatCommand {
    void Execute();
    void Undo();
    string GetDescription();
}
public class AttackCommand : ICombatCommand {
    Combatant attacker, target;
    AttackResult result;
    public void Execute() {
        result = attacker.RollAttack(target);
        if (result.hit) target.TakeDamage(result.damage);
    }
    public void Undo() {
        if (result.hit) target.RestoreHP(result.damage);
    }
    public string GetDescription()
        => $"{attacker.Name} tấn công {target.Name}: {result}";
}`,
   tip:'Command Pattern + List<ICombatCommand> = combat log miễn phí. Rất hữu ích để debug và làm replay.'},

  {sec:'combat', cat:'carch', step:'Pattern', name:'Combat Event Bus',
   def:'Thay vì các system gọi nhau trực tiếp, dùng Event Bus để broadcast event combat. CombatManager không cần biết UI, VFX, Audio tồn tại — chúng tự subscribe và xử lý khi nhận event.',
   code:`public static class CombatEventBus {
    public static event Action<Combatant>          OnTurnStart;
    public static event Action<Combatant>          OnTurnEnd;
    public static event Action<AttackResult>       OnAttackResolved;
    public static event Action<Combatant, int>     OnDamageTaken;
    public static event Action<Combatant>          OnCombatantDied;
    public static event Action<SpellSO, Combatant> OnSpellCast;
    public static event Action<int>                OnRoundEnd;
}
// CombatManager chỉ raise:
CombatEventBus.OnDamageTaken?.Invoke(target, damage);`,
   tip:'Event Bus tách hoàn toàn CombatManager khỏi UI/VFX/Audio. Thêm sound effect mà không sửa 1 dòng combat code.'},

  {sec:'combat', cat:'carch', step:'Pattern', name:'Enemy AI (Basic State Machine)',
   def:'AI enemy trong turn-based không cần phức tạp — chỉ cần quyết định tốt. Pattern cơ bản: nếu có target trong range thì đánh, nếu không thì di chuyển lại gần. Dùng Coroutine để tạo delay tự nhiên.',
   code:`public IEnumerator TakeTurn(Combatant enemy) {
    var target = FindBestTarget(enemy);
    if (IsInAttackRange(enemy, target)) {
        yield return ExecuteAttack(enemy, target);
    } else {
        var cell = GetCellToward(enemy, target);
        yield return ExecuteMove(enemy, cell);
        if (IsInAttackRange(enemy, target))
            yield return ExecuteAttack(enemy, target);
    }
    enemy.EndTurn();
}`,
   tip:'Coroutine cho AI turn tạo visual delay tự nhiên — player thấy enemy "suy nghĩ" thay vì action tức thì.'},

  // ── PHẦN 5 ──────────────────────────────────────────────────────
  {sec:'dlgquest', cat:'dlg', step:'Core', name:'Dialogue System — tổng quan',
   def:'Hệ thống cho NPC nói chuyện với player. Gồm 3 thành phần: (1) DialogueSO — data của cuộc hội thoại. (2) DialogueRunner — chạy và điều phối flow. (3) DialogueUI — hiển thị text và lựa chọn. Ba thứ tách biệt hoàn toàn.',
   code:`// 3 layer tách biệt:
// Data:    DialogueSO (ScriptableObject, các node)
// Logic:   DialogueRunner (MonoBehaviour, điều hướng node)
// Display: DialogueUI (MonoBehaviour, render text/choice)

// DialogueRunner không biết UI tồn tại.
// DialogueUI không biết logic node.
// Giao tiếp qua C# events.`,
   tip:'Tách Data/Logic/Display ngay từ đầu — nếu trộn lẫn sẽ không thể thay skin UI mà không rewrite logic.'},

  {sec:'dlgquest', cat:'dlg', step:'Core', name:'DialogueNodeSO',
   def:'ScriptableObject đại diện cho một "bong bóng thoại" — lưu speaker, text, list lựa chọn tiếp theo, và conditions (nếu có). Các node kết nối với nhau tạo thành đồ thị hội thoại.',
   code:`[CreateAssetMenu(menuName = "RPG/Dialogue/Node")]
public class DialogueNodeSO : ScriptableObject {
    public string         speakerID;   // "Player", "Innkeeper"
    [TextArea(3, 8)]
    public string         text;
    public DialogueChoice[] choices;   // nếu rỗng = auto-advance
    public DialogueNodeSO   nextNode;  // nếu không có choice
    public DialogueCondition[] conditions; // hiện node này khi nào
}
[System.Serializable]
public class DialogueChoice {
    public string         choiceText;
    public DialogueNodeSO nextNode;
    public DialogueCondition[] conditions;
    public DialogueEffect[]    effects;   // trigger khi chọn
}`,
   tip:'Dùng [TextArea] trong Inspector để gõ dialogue thoải mái. Không hard-code string trong code.'},

  {sec:'dlgquest', cat:'dlg', step:'Core', name:'DialogueRunner',
   def:'MonoBehaviour điều phối flow hội thoại — nhận DialogueSO, duyệt qua các node theo lựa chọn của player, evaluate condition, trigger effect. Raise event để UI cập nhật.',
   code:`public class DialogueRunner : MonoBehaviour {
    public static DialogueRunner Instance { get; private set; }
    public event Action<DialogueNodeSO>    OnNodeEnter;
    public event Action<DialogueChoice[]>  OnChoicesPresented;
    public event Action                    OnDialogueEnd;

    private DialogueNodeSO current;

    public void StartDialogue(DialogueNodeSO startNode) {
        current = startNode;
        ProcessNode(current);
    }
    public void SelectChoice(int index) {
        var choice = current.choices[index];
        TriggerEffects(choice.effects);
        ProcessNode(choice.nextNode);
    }
    void ProcessNode(DialogueNodeSO node) {
        if (node == null) { OnDialogueEnd?.Invoke(); return; }
        current = node;
        OnNodeEnter?.Invoke(node);
        if (node.choices.Length == 0)
            OnChoicesPresented?.Invoke(null); // auto-advance
        else
            OnChoicesPresented?.Invoke(node.choices);
    }
}`,
   tip:'DialogueRunner là Singleton — chỉ có 1 cuộc hội thoại chạy tại một thời điểm trong game.'},

  {sec:'dlgquest', cat:'node', step:'Node graph', name:'Node graph editor',
   def:'Công cụ visual để thiết kế dialogue dạng đồ thị — kéo thả node, vẽ kết nối. Không thể thiếu khi dialogue phức tạp. Có thể dùng tool sẵn (Yarn Spinner, Dialogue System) hoặc tự làm bằng Unity GraphView API.',
   code:`// Lựa chọn tool:
// 1. Yarn Spinner (free, mã nguồn mở)
//    → dùng file .yarn (ngôn ngữ riêng giống Ink)
//    → có node graph editor trong Unity
// 2. Dialogue System for Unity (~$65 Asset Store)
//    → đầy đủ tính năng nhất, có localization
// 3. Tự làm bằng Unity GraphView API
//    → học nhiều nhưng hoàn toàn tuỳ chỉnh

// Với indie RPG DnD: Yarn Spinner là lựa chọn tốt nhất`,
   tip:'Yarn Spinner được dùng trong Disco Elysium-style games. Miễn phí và document rất tốt.'},

  {sec:'dlgquest', cat:'node', step:'Node graph', name:'Dialogue condition',
   def:'Điều kiện để một node hoặc một choice hiển thị — kiểm tra quest state, item trong inventory, flag đã xảy ra chưa, hoặc stat của player. Evaluate trước khi hiển thị choice.',
   code:`public abstract class DialogueCondition : ScriptableObject {
    public abstract bool Evaluate(DialogueContext ctx);
}

// Ví dụ: HasItemCondition
[CreateAssetMenu(menuName = "RPG/Dialogue/Condition/HasItem")]

// Dùng: "Chỉ hiện choice [Mua kiếm] nếu có >= 50 gold"`,

   def:'Hành động xảy ra khi player chọn một lựa chọn — trao quest, thêm/bớt item, set flag, thay đổi relationship, trigger event. Effect SO cho phép brew hiệu ứng mới mà không sửa DialogueRunner.',

}

[CreateAssetMenu(menuName = "RPG/Dialogue/Effect/GiveQuest")]

  {sec:'dlgquest', cat:'node', step:'Node graph', name:'Localization & string table',
   def:'Thay vì hard-code text trong SO, dùng string key trỏ đến bảng dịch (string table). Unity Localization package quản lý nhiều ngôn ngữ. Quan trọng nếu game có kế hoạch release đa ngôn ngữ.',

  {sec:'dlgquest', cat:'quest', step:'Quest system', name:'QuestSO',
   def:'ScriptableObject định nghĩa một quest — tên, mô tả, list objectives, rewards, prerequisite conditions. Template bất biến. Không lưu trạng thái hoàn thành — đó là việc của QuestLog.',
   code:`[CreateAssetMenu(menuName = "RPG/Quest")]
public class QuestSO : ScriptableObject {
    public string         questName;
    [TextArea] public string description;
    public QuestObjective[] objectives;
    public QuestReward[]    rewards;

}
[System.Serializable]
public class QuestObjective {

  {sec:'dlgquest', cat:'quest', step:'Quest system', name:'QuestInstance & QuestLog',
   def:'QuestInstance là runtime state của 1 quest đang active — lưu progress từng objective, trạng thái (Active/Completed/Failed). QuestLog là danh sách tất cả QuestInstance của player, persist qua save/load.',
   code:`public class QuestInstance {
    public QuestSO   questData;
    public QuestState state = QuestState.Active;
    public int[]     objectiveProgress; // [0] = 2/5 goblins killed

    public bool IsCompleted() {
        for (int i = 0; i < questData.objectives.Length; i++)
            if (objectiveProgress[i] < questData.objectives[i].requiredCount)
                return false;
        return true;
    }
}
public enum QuestState { Active, Completed, Failed, Turned_In }`,
   tip:'Tách QuestSO (data) và QuestInstance (state) — giống pattern CharacterStatsSO vs CharacterSheet.'},

  {sec:'dlgquest', cat:'quest', step:'Quest system', name:'Objective tracking',
   def:'Cơ chế tự động cập nhật progress khi player thực hiện hành động liên quan. Dùng event bus — khi enemy chết, item được nhặt, location được reach thì broadcast event, QuestLog tự cập nhật objective.',
   code:`// QuestEventBus:
public static event Action<string, int> OnObjectiveProgress;
// (targetID, amount)

// Khi enemy chết:
OnObjectiveProgress?.Invoke("GoblinChief", 1);

// QuestLog tự lắng nghe:
void Start() {
    QuestEventBus.OnObjectiveProgress += TrackProgress;
}
void TrackProgress(string targetID, int amount) {
    foreach (var quest in activeQuests)
        quest.UpdateObjective(targetID, amount);
}`,
   tip:'Event-driven tracking tách hoàn toàn QuestLog khỏi combat/inventory/world — không coupling nào.'},

  {sec:'dlgquest', cat:'quest', step:'Quest system', name:'Quest reward & turn-in',
   def:'Khi tất cả objectives hoàn thành, player quay về NPC để turn in quest — nhận XP, gold, item, unlock nội dung mới. Turn-in trigger QuestEffect và có thể mở quest tiếp theo trong chuỗi.',
   code:`public void TurnInQuest(QuestInstance instance) {
    if (!instance.IsCompleted()) return;

    instance.state = QuestState.Turned_In;

    // Trao reward:
    foreach (var reward in instance.questData.rewards) {
        reward.Grant(player);  // XP, gold, item, unlock
    }

    // Unlock quest tiếp theo:
    foreach (var next in instance.questData.unlocksQuests)
        if (ArePrerequisitesMet(next))
            OfferQuest(next);

    OnQuestCompleted?.Invoke(instance);
}`,
   tip:'Kiểm tra prerequisites trước khi offer quest mới — tránh player nhận quest sai thứ tự trong quest chain.'},

  {sec:'dlgquest', cat:'npc', step:'NPC', name:'NPC Interactable',
   def:'Component gắn vào NPC GameObject — xử lý khi player click/approach. Lưu reference đến DialogueSO hiện tại (có thể thay đổi theo quest state). Kiểm tra điều kiện trước khi bắt đầu dialogue.',
   code:`public class NPCInteractable : MonoBehaviour {
    [SerializeField] DialogueNodeSO defaultDialogue;
    [SerializeField] NPCDialogueEntry[] conditionalDialogues;

    public void Interact(PlayerController player) {
        var dialogue = GetCurrentDialogue();
        DialogueRunner.Instance.StartDialogue(dialogue);
    }
    DialogueNodeSO GetCurrentDialogue() {
        foreach (var entry in conditionalDialogues)
            if (entry.condition.Evaluate(GameContext.Current))
                return entry.dialogue;
        return defaultDialogue;
    }
}
[System.Serializable]
public struct NPCDialogueEntry {
    public DialogueCondition condition;
    public DialogueNodeSO    dialogue;
}`,
   tip:'NPC có nhiều dialogue theo quest state — pattern này cho phép cùng 1 NPC nói khác nhau ở mỗi giai đoạn game.'},

  {sec:'dlgquest', cat:'npc', step:'NPC', name:'Relationship & Reputation',
   def:'Hệ thống theo dõi quan hệ giữa player và faction/NPC — từ Hostile đến Friendly. Ảnh hưởng dialogue options có sẵn, giá mua bán, khả năng nhận quest. Lưu dưới dạng Dictionary<string, int>.',
   code:`public class ReputationSystem {
    // factionID → điểm (-100 đến 100)
    private Dictionary<string, int> scores = new();

    public void Adjust(string factionID, int delta) {
        scores.TryGetValue(factionID, out int cur);
        scores[factionID] = Mathf.Clamp(cur + delta, -100, 100);
        OnReputationChanged?.Invoke(factionID, scores[factionID]);
    }
    public ReputationTier GetTier(string factionID) {
        int score = scores.GetValueOrDefault(factionID, 0);
        return score switch {
            >= 75  => ReputationTier.Exalted,
            >= 25  => ReputationTier.Friendly,
            >= -24 => ReputationTier.Neutral,
            >= -74 => ReputationTier.Hostile,
            _      => ReputationTier.Hated
        };
    }
}`,
   tip:'Dùng factionID string thay vì enum — dễ thêm faction mới mà không sửa code (chỉ thêm data).'},

  {sec:'dlgquest', cat:'darch', step:'Architecture', name:'GameFlag system',
   def:'Hệ thống lưu các sự kiện đã xảy ra trong game dưới dạng bool flag — "talked_to_innkeeper", "saved_village", "killed_bandit_lord". Dùng để điều kiện hoá dialogue, quest, và world state.',
   code:`public class GameFlagSystem {
    private HashSet<string> flags = new();

    public void Set(string flag)          => flags.Add(flag);
    public void Clear(string flag)        => flags.Remove(flag);
    public bool IsSet(string flag)        => flags.Contains(flag);

    // Dùng trong DialogueCondition:
    // new FlagCondition("rescued_prisoners")
    // Dùng trong DialogueEffect:
    // new SetFlagEffect("talked_to_oracle")
}

// Convention đặt tên flag:
// verb_object: "killed_goblin_king", "found_ancient_sword"

   tip:'Đặt convention tên flag nhất quán ngay từ đầu — 200 flag không có quy tắc là địa ngục khi debug.'},

  {sec:'dlgquest', cat:'darch', step:'Architecture', name:'DialogueContext',
   def:'Object tổng hợp truyền vào Condition và Effect khi evaluate — chứa reference đến inventory, quest log, reputation system, flag system, player stats. Tránh dùng Singleton trực tiếp trong mỗi condition.',
   code:`public class DialogueContext {
    public PlayerInventory  inventory;
    public QuestLog         questLog;
    public ReputationSystem reputation;
    public GameFlagSystem   flags;
    public CharacterSheet   playerSheet;

    // Tạo 1 lần khi bắt đầu dialogue:

}`,

  {sec:'ui', cat:'canvas', step:'Nền tảng', name:'Canvas & Render Mode',
   def:'Canvas là container gốc của mọi UI element trong Unity. Có 3 Render Mode: Screen Space Overlay (UI luôn trên cùng, không bị che), Screen Space Camera (UI render qua camera, hỗ trợ depth), World Space (UI nằm trong 3D world — dùng cho nametag, healthbar trên đầu NPC).',
   code:`// Screen Space Overlay: HUD, Menu, Dialogue UI
// → Canvas > Render Mode = Screen Space - Overlay

// Screen Space Camera: UI cần depth/sort với 3D
// → Assign UI Camera riêng, Plane Distance = 1

// World Space: floating healthbar, nametag
// → Canvas > Render Mode = World Space
// → Scale rất nhỏ: (0.01, 0.01, 0.01)
// → Billboard: luôn xoay về phía Main Camera`,
   tip:'Dùng ít nhất 2 Canvas riêng: 1 Screen Space Overlay cho HUD/Menu, 1 World Space cho in-world UI như healthbar.'},

  {sec:'ui', cat:'canvas', step:'Nền tảng', name:'RectTransform',
   def:'Thay thế Transform cho UI element — lưu anchors, pivot, size delta thay vì position/scale thông thường. Anchor quyết định UI bám vào góc nào của parent khi màn hình resize.',
   code:`// Anchor presets quan trọng:
// Top-Left:   anchor (0,1) — cố định góc trên trái
// Center:     anchor (0.5,0.5) — giữa màn hình
// Stretch:    anchor (0,0)→(1,1) — full parent size

// Code set anchor:
RectTransform rt = GetComponent<RectTransform>();
rt.anchorMin = new Vector2(0, 0);
rt.anchorMax = new Vector2(1, 1); // stretch full
rt.offsetMin = new Vector2(10, 10); // padding
rt.offsetMax = new Vector2(-10, -10);`,
   tip:'Luôn dùng Anchor Presets (Alt+Click trong Inspector) thay vì gõ số tay — nhanh hơn và ít lỗi hơn.'},

  {sec:'ui', cat:'canvas', step:'Nền tảng', name:'TextMeshPro (TMP)',
   def:'Thư viện text nâng cao — hỗ trợ rich text, font atlas, outline, glow, shadow với chất lượng cao ở mọi kích thước. Bắt buộc thay thế UI.Text cũ. Dùng TextMeshProUGUI cho UI Canvas, TextMeshPro cho World Space.',
   code:`// Import: Window > TextMeshPro > Import TMP Essential Resources

// Rich text tags trong string:

// <color=#FF4444>Đỏ</color>

damageText.text = $"<color=#FFD700><size=32>CRIT -{damage}!</size></color>";`,

  {sec:'ui', cat:'canvas', step:'Nền tảng', name:'Layout Group',
   def:'Component tự động sắp xếp children — HorizontalLayoutGroup (hàng ngang), VerticalLayoutGroup (cột dọc), GridLayoutGroup (lưới). Dùng cho inventory grid, action bar, party portrait bar.',
   code:`// VerticalLayoutGroup cho quest list, skill list:

// Child Force Expand: Height = false

// GridLayoutGroup cho inventory (5x4 slots):

  {sec:'ui', cat:'hud', step:'HUD', name:'Health & Mana bar',
   def:'Thanh HP/Mana hiển thị trạng thái real-time. Dùng Image component với Image Type = Filled và Fill Method = Horizontal. Subscribe vào OnHPChanged event từ CharacterSheet — không polling trong Update().',
   code:`public class HealthBar : MonoBehaviour {
    [SerializeField] Image fillImage;
    [SerializeField] CharacterSheet target;

    void Start() {
        target.OnHPChanged += UpdateBar;
        UpdateBar(target.currentHP, target.GetMaxHP());
    }
    void UpdateBar(int current, int max) {
        float pct = (float)current / max;
        fillImage.fillAmount = pct;
        // Đổi màu theo %: xanh → vàng → đỏ
        fillImage.color = Color.Lerp(Color.red, Color.green, pct);
    }
    void OnDestroy() => target.OnHPChanged -= UpdateBar;
}`,
   tip:'Luôn unsubscribe event trong OnDestroy() — memory leak phổ biến nhất trong Unity UI.'},

  {sec:'ui', cat:'hud', step:'HUD', name:'Floating damage number',
   def:'Text nổi lên và fade out mỗi khi nhân vật nhận damage hoặc heal. Spawn từ Object Pool, animate bằng Coroutine hoặc DOTween, rồi trả về pool. Vị trí spawn ở trên đầu nhân vật trong World Space.',
   code:`public IEnumerator SpawnDamageNumber(int amount, Vector3 worldPos, bool isCrit) {
    var go  = damagePool.Get();
    var tmp = go.GetComponent<TextMeshPro>();

    tmp.text = isCrit
        ? $"<color=#FFD700><b>CRIT {amount}!</b></color>"
        : $"<color=#FF6666>{amount}</color>";

    go.transform.position = worldPos + Vector3.up * 1.5f;

    float t = 0f;
    Vector3 start = go.transform.position;
    while (t < 1f) {
        t += Time.deltaTime / 0.8f;
        go.transform.position = start + Vector3.up * t * 0.8f;
        tmp.alpha = 1f - t;
        yield return null;
    }
    damagePool.Release(go);
}`,
   tip:'Dùng Object Pool cho floating numbers — combat có thể spawn 20+ số/giây, tạo GameObject mới mỗi lần sẽ lag.'},

  {sec:'ui', cat:'hud', step:'HUD', name:'Turn order UI (Initiative tracker)',
   def:'Panel hiển thị thứ tự lượt của tất cả combatant — portrait, tên, HP bar nhỏ. Highlight combatant đang hành động. Subscribe OnTurnStart/OnTurnEnd từ CombatEventBus để tự cập nhật.',
   code:`public class InitiativeTrackerUI : MonoBehaviour {
    [SerializeField] Transform container;
    [SerializeField] GameObject portraitPrefab;

    void Start() {
        CombatEventBus.OnCombatStart   += BuildTracker;
        CombatEventBus.OnTurnStart     += HighlightCurrent;
        CombatEventBus.OnCombatantDied += RemovePortrait;
    }
    void BuildTracker(List<Combatant> order) {
        foreach (Transform c in container) Destroy(c.gameObject);
        foreach (var combatant in order) {
            var go = Instantiate(portraitPrefab, container);
            go.GetComponent<PortraitUI>().Setup(combatant);
        }
    }
    void HighlightCurrent(Combatant c) { /* set border highlight */ }
}`,
   tip:'Initiative tracker là UI quan trọng nhất trong turn-based RPG — player cần đọc thứ tự để lên kế hoạch.'},

  {sec:'ui', cat:'hud', step:'HUD', name:'Action bar & cooldown',
   def:'Thanh chứa các action/spell có thể dùng trong combat — hiển thị icon, key binding, trạng thái available/used/cooldown. Highlight action đang được chọn. Grey out action không thể dùng.',
   code:`public class ActionBarSlot : MonoBehaviour {
    [SerializeField] Image  iconImage;
    [SerializeField] Image  cooldownOverlay; // màu tối phủ lên
    [SerializeField] TextMeshProUGUI keyLabel;

    public void SetState(ActionSlotState state) {
        switch (state) {
            case ActionSlotState.Available:
                iconImage.color      = Color.white;
                cooldownOverlay.gameObject.SetActive(false); break;
            case ActionSlotState.Used:
                iconImage.color      = new Color(0.4f,0.4f,0.4f);
                cooldownOverlay.gameObject.SetActive(true);
                cooldownOverlay.fillAmount = 1f; break;
            case ActionSlotState.NotEnoughResource:
                iconImage.color      = new Color(0.6f,0.3f,0.3f); break;
        }
    }
}`,
   tip:'Grey out action không dùng được — player không nên click rồi nhận error. Feedback visual trước, error message sau.'},

  {sec:'ui', cat:'inv', step:'Inventory', name:'Inventory grid UI',
   def:'Lưới ô chứa item — mỗi ô là một InventorySlotUI. Dùng GridLayoutGroup để tự sắp xếp. Slot có thể trống (empty) hoặc chứa item (hiện icon + stack count). Hỗ trợ click, right-click, drag-drop.',
   code:`public class InventorySlotUI : MonoBehaviour, IPointerClickHandler,
                                       IBeginDragHandler, IDropHandler {
    [SerializeField] Image          iconImage;
    [SerializeField] TextMeshProUGUI stackText;
    private ItemStack currentStack;

    public void Setup(ItemStack stack) {
        currentStack = stack;
        iconImage.sprite  = stack?.item.icon;
        iconImage.enabled = stack != null;
        stackText.text    = stack?.count > 1 ? stack.count.ToString() : "";
    }
    public void OnPointerClick(PointerEventData e) {
        if (e.button == PointerEventData.InputButton.Right)
            ContextMenu.Show(currentStack, transform.position);
    }
}`,
   tip:'Implement IPointerClickHandler thay vì OnMouseDown — hoạt động đúng với EventSystem và hỗ trợ touch.'},

  {sec:'ui', cat:'inv', step:'Inventory', name:'Drag & Drop item',
   def:'Kéo item từ slot này sang slot khác. Unity hỗ trợ qua IBeginDragHandler, IDragHandler, IEndDragHandler interfaces. Tạo ghost image theo cursor khi drag, swap hoặc merge item khi drop.',
   code:`public class InventorySlotUI : MonoBehaviour,
    IBeginDragHandler, IDragHandler, IEndDragHandler, IDropHandler {

    static InventorySlotUI dragSource;
    static GameObject      ghostImage;

    public void OnBeginDrag(PointerEventData e) {
        dragSource = this;
        ghostImage = CreateGhost(currentStack.item.icon);
    }
    public void OnDrag(PointerEventData e) {
        ghostImage.transform.position = e.position;
    }
    public void OnEndDrag(PointerEventData e) {
        Destroy(ghostImage);
        dragSource = null;
    }
    public void OnDrop(PointerEventData e) {
        if (dragSource != null && dragSource != this)
            InventoryManager.SwapSlots(dragSource.slotIndex, slotIndex);
    }
}`,
   tip:'Đặt ghost image trong một Canvas riêng ở layer cao nhất — tránh bị clip bởi các panel khác khi drag.'},

  {sec:'ui', cat:'inv', step:'Inventory', name:'Equipment slot UI',
   def:'Panel hiển thị các slot trang bị trên nhân vật (Head, Chest, Legs, Weapon, Shield, Ring x2, Amulet...). Mỗi slot accept chỉ đúng loại item. Khi equip/unequip, trigger stat recalculation.',
   code:`public class EquipmentSlotUI : MonoBehaviour, IDropHandler {
    public EquipmentSlotType slotType;  // Head, Chest, Weapon...

    public void OnDrop(PointerEventData e) {
        var dragged = InventorySlotUI.dragSource;
        if (dragged?.currentStack?.item is EquippableItem eq
            && eq.slotType == slotType) {
            EquipmentManager.Equip(eq, slotType);
            UpdateDisplay(eq);
        }
    }
    void UpdateDisplay(EquippableItem item) {
        icon.sprite   = item?.icon;
        icon.enabled  = item != null;
    }
}`,
   tip:'Validate loại item trước khi accept drop — player không nên drag mũ vào slot giày được.'},

  {sec:'ui', cat:'tooltip', step:'Tooltip', name:'Item tooltip',
   def:'Popup hiển thị thông tin chi tiết khi hover/click vào item — tên, type, stats, description, compare với item đang equip. Theo dõi chuột và tự điều chỉnh vị trí để không ra ngoài màn hình.',
   code:`public class TooltipUI : MonoBehaviour {
    public static TooltipUI Instance { get; private set; }
    [SerializeField] TextMeshProUGUI titleText, bodyText;
    [SerializeField] RectTransform   panel;

    public void Show(ItemData item, Vector2 screenPos) {
        titleText.text = $"<b>{item.itemName}</b>";
        bodyText.text  = item.GetTooltipText();
        gameObject.SetActive(true);
        PositionNearCursor(screenPos);
    }
    void PositionNearCursor(Vector2 pos) {
        // Clamp để không bị ra ngoài màn hình:
        float x = Mathf.Clamp(pos.x + 12, 0, Screen.width  - panel.rect.width);
        float y = Mathf.Clamp(pos.y - 12, panel.rect.height, Screen.height);
        panel.position = new Vector2(x, y);
    }
    public void Hide() => gameObject.SetActive(false);
}`,
   tip:'Tooltip Singleton đơn giản hơn nhiều so với mỗi item tự tạo tooltip riêng — chỉ cần 1 panel, hiện/ẩn khi cần.'},

  {sec:'ui', cat:'tooltip', step:'Tooltip', name:'Character sheet panel',
   def:'Panel hiển thị toàn bộ stats của nhân vật — 6 ability scores, derived stats, saving throws, skills, equipment summary. Update realtime khi stat thay đổi. Subscribe OnStatChanged event.',
   code:`public class CharacterSheetUI : MonoBehaviour {
    [SerializeField] TextMeshProUGUI[] abilityScoreTexts; // 6 texts
    [SerializeField] TextMeshProUGUI   hpText, acText, pbText;

    void Start() => sheet.OnAnyStatChanged += Refresh;

    void Refresh() {
        // Ability scores + modifiers:
        var abilities = new[]{sheet.STR,sheet.DEX,sheet.CON,
                               sheet.INT,sheet.WIS,sheet.CHA};
        for (int i = 0; i < 6; i++) {
            int mod = CharacterSheet.GetModifier(abilities[i]);
            string sign = mod >= 0 ? "+" : "";
            abilityScoreTexts[i].text =
                $"{abilities[i]}\n<size=11>{sign}{mod}</size>";
        }
        hpText.text = $"{sheet.currentHP} / {sheet.GetMaxHP()}";
        acText.text = sheet.GetAC().ToString();
        pbText.text = $"+{sheet.proficiencyBonus}";
    }
}`,
   tip:'Hiển thị cả ability score (16) lẫn modifier (+3) trong cùng 1 text — player DnD đọc cả 2.'},

  {sec:'ui', cat:'tooltip', step:'Tooltip', name:'Context menu (right-click)',
   def:'Menu nhỏ xuất hiện khi right-click vào item — Use, Equip, Drop, Examine, Split Stack. Spawn tại vị trí click, đóng khi click ra ngoài. Các option hiển thị tuỳ theo loại item và context.',
   code:`public class ContextMenuUI : MonoBehaviour {
    public static ContextMenuUI Instance { get; private set; }
    [SerializeField] Transform      buttonContainer;
    [SerializeField] GameObject     buttonPrefab;

    public void Show(ItemStack stack, Vector2 pos) {
        ClearButtons();
        transform.position = pos;
        gameObject.SetActive(true);

        if (stack.item is ConsumableItem)
            AddButton("Sử dụng", () => UseItem(stack));
        if (stack.item is EquippableItem)
            AddButton("Trang bị", () => EquipItem(stack));
        AddButton("Bỏ xuống", () => DropItem(stack));
        AddButton("Xem thông tin", () => ExamineItem(stack));
    }
    // Đóng khi click bên ngoài:
    void Update() {
        if (Input.GetMouseButtonDown(0) && !IsPointerOverMenu())
