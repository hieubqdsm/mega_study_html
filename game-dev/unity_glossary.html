            gameObject.SetActive(false);
    }
}`,
   tip:'Context menu đơn giản hơn nhiều lựa chọn inline — tránh UI lごちゃごちゃ, player chỉ thấy option khi cần.'},

  {sec:'ui', cat:'uiarch', step:'Architecture', name:'UI Manager & Screen Stack',
   def:'UIManager quản lý tất cả các panel — mở, đóng, push/pop theo stack. Khi mở Inventory thì pause game và block input combat. Khi nhấn Escape thì đóng panel trên cùng của stack.',
   code:`public class UIManager : MonoBehaviour {
    public static UIManager Instance { get; private set; }
    private Stack<UIPanel> panelStack = new();

    public void Push(UIPanel panel) {
        if (panelStack.Count > 0) panelStack.Peek().OnCovered();
        panelStack.Push(panel);
        panel.Open();
        Time.timeScale = panel.pausesGame ? 0f : 1f;
    }
    public void Pop() {
        if (panelStack.Count == 0) return;
        panelStack.Pop().Close();
        if (panelStack.Count > 0) panelStack.Peek().OnRevealed();
        else Time.timeScale = 1f;
    }
    void Update() {
        if (Input.GetKeyDown(KeyCode.Escape) && panelStack.Count > 0)
            Pop();
    }
}`,
   tip:'Screen Stack tự xử lý Escape key — không cần mỗi panel tự lắng nghe Escape riêng lẻ.'},

  {sec:'ui', cat:'uiarch', step:'Architecture', name:'MVP pattern cho UI',
   def:'Model-View-Presenter tách biệt data (Model), hiển thị (View), và logic kết nối (Presenter). View chỉ biết cách render. Presenter biết cả Model lẫn View. Thay skin UI mà không đụng logic game.',
   code:`// Model: CharacterSheet (data thuần)
// View: CharacterSheetUI (chỉ hiển thị)
// Presenter: CharacterSheetPresenter (kết nối 2 bên)

public class CharacterSheetPresenter : MonoBehaviour {
    [SerializeField] CharacterSheet    model;
    [SerializeField] CharacterSheetUI  view;

    void Start() {
        model.OnAnyStatChanged += () => view.Refresh(model);
        view.OnCloseClicked    += () => UIManager.Instance.Pop();
        view.Refresh(model); // initial render
    }
}
// View không import CharacterSheet namespace
// Model không biết UI tồn tại
// Presenter là cầu nối duy nhất`,
   tip:'MVP rất hữu ích khi làm co-op sau này — cùng Presenter nhưng swap View khác nhau cho local vs remote player.'},

  {sec:'ui', cat:'uiarch', step:'Architecture', name:'Object Pool cho UI',
   def:'Tái sử dụng UI element thay vì Instantiate/Destroy liên tục — quan trọng cho damage number, loot popup, quest notification. Unity có UnityEngine.Pool.ObjectPool<T> built-in từ Unity 2021+.',
   code:`public class DamageNumberPool : MonoBehaviour {
    ObjectPool<TextMeshPro> pool;

    void Awake() {
        pool = new ObjectPool<TextMeshPro>(
            createFunc:    () => Instantiate(prefab),
            actionOnGet:   t  => t.gameObject.SetActive(true),
            actionOnRelease:t => t.gameObject.SetActive(false),
            actionOnDestroy:t => Destroy(t.gameObject),
            maxSize: 30
        );
    }
    public TextMeshPro Get()            => pool.Get();
    public void Release(TextMeshPro t)  => pool.Release(t);
}`,
   tip:'Dùng ObjectPool<T> built-in của Unity thay vì tự viết — tránh bug subtle trong pool tự làm.'},

  {sec:'ui', cat:'uiarch', step:'Architecture', name:'Responsive UI & Safe Area',
   def:'UI phải hoạt động đúng trên nhiều độ phân giải (1080p, 4K, ultrawide) và trên mobile có notch. Dùng Canvas Scaler với Scale With Screen Size. Dùng Safe Area để UI không bị che bởi notch iPhone/Android.',
   code:`// Canvas Scaler settings:
// UI Scale Mode: Scale With Screen Size
// Reference Resolution: 1920 x 1080
// Screen Match Mode: Match Width Or Height
// Match: 0.5 (cân bằng width và height)

// Safe Area cho mobile (iOS/Android):
public class SafeAreaPanel : MonoBehaviour {
    void Start() {
        var rt     = GetComponent<RectTransform>();
        var area   = Screen.safeArea;
        var canvas = GetComponentInParent<Canvas>();
        var size   = canvas.pixelRect.size;
        rt.anchorMin = area.position / size;
        rt.anchorMax = (area.position + area.size) / size;
    }
}`,
   tip:'Test UI ở 3 tỷ lệ: 16:9 (1080p), 16:10 (tablet), 19.5:9 (phone notch) — phần lớn bug layout lộ ra ở đây.'},

  // ── PHẦN 7: SAVE/LOAD ───────────────────────────────────────────
  {sec:'save',cat:'sdata',step:'Data design',name:'SaveData — cấu trúc tổng thể',
   def:'SaveData là class chứa toàn bộ trạng thái cần persist — party, world state, flags, quests, settings. Dùng [Serializable] để Unity/JSON có thể serialize. Tách thành nhiều sub-object theo domain để dễ quản lý.',
   code:`[System.Serializable]
public class SaveData {
    public string         saveVersion = "1.0";
    public string         timestamp;
    public float          playtime;
    public PartySaveData  party;
    public WorldSaveData  world;
    public QuestSaveData  quests;
    public SettingsSave   settings;
}
[System.Serializable]
public class PartySaveData {
    public List<CharacterSaveEntry> members = new();
    public int    gold;
    public string currentSceneID;
    public Vector3 playerPosition;
}`,
   tip:'Lưu saveVersion trong mỗi file — khi update game structure, dùng version để migrate save cũ.'},

  {sec:'save',cat:'sdata',step:'Data design',name:'ISaveable interface',
   def:'Interface đánh dấu object nào cần được lưu/load. Mỗi system (CharacterSheet, QuestLog, Inventory...) implement ISaveable với GetSaveData() và LoadFromData(). SaveManager thu thập tất cả.',
   code:`public interface ISaveable {
    string SaveID { get; }       // unique key trong save file
    object GetSaveData();        // trả về [Serializable] object
    void   LoadFromData(object data);
}

// CharacterSheet implement:
public class CharacterSheet : MonoBehaviour, ISaveable {
    public string SaveID => "character_" + characterID;
    public object GetSaveData() => new CharacterSaveEntry {
        characterID = characterID,
        currentHP   = currentHP,
        level       = level,
        // ...
    };
    public void LoadFromData(object data) {
        var d   = (CharacterSaveEntry)data;
        currentHP = d.currentHP;
        level     = d.level;
    }
}`,
   tip:'SaveID phải unique và stable — đừng dùng index hoặc tên có thể đổi. Dùng GUID hoặc prefab asset name.'},

  {sec:'save',cat:'sdata',step:'Data design',name:'Save slot system',
   def:'RPG thường cho phép nhiều save slot (Auto, Quick, Manual 1-3). Mỗi slot là một file riêng với metadata (tên nhân vật, playtime, timestamp, thumbnail screenshot). Hiển thị trong Load Game UI.',
   code:`public class SaveSlotInfo {
    public int    slotIndex;
    public string characterName;
    public int    level;
    public string locationName;
    public float  playtimeSeconds;
    public string timestamp;
    public byte[] thumbnailPNG;    // screenshot 256x144
}

// Đường dẫn file:
// Application.persistentDataPath + "/saves/slot_0.json"
// Application.persistentDataPath + "/saves/slot_0_meta.json"
// Lưu meta riêng để Load Game UI đọc nhanh
// mà không cần load toàn bộ save file`,
   tip:'Lưu metadata (thumbnail, time, location) tách khỏi save data — Load Game UI load nhanh hơn nhiều.'},

  {sec:'save',cat:'sser',step:'Serialization',name:'JSON serialization',
   def:'Chuyển object C# thành chuỗi JSON để lưu vào file. Unity có JsonUtility (đơn giản, nhanh) và Newtonsoft Json.NET (mạnh hơn, hỗ trợ Dictionary, polymorphism). Với RPG phức tạp nên dùng Newtonsoft.',
   code:`// Newtonsoft (cài qua Package Manager: com.unity.nuget.newtonsoft-json):
using Newtonsoft.Json;

// Save:
string json = JsonConvert.SerializeObject(saveData,
    Formatting.Indented,
    new JsonSerializerSettings { TypeNameHandling = TypeNameHandling.Auto });
File.WriteAllText(path, json);

// Load:
string json = File.ReadAllText(path);
var data = JsonConvert.DeserializeObject<SaveData>(json,
    new JsonSerializerSettings { TypeNameHandling = TypeNameHandling.Auto });`,
   tip:'TypeNameHandling.Auto cần thiết nếu save list có nhiều subtype (ví dụ: List<SpellEffect> với nhiều loại).'},

  {sec:'save',cat:'sser',step:'Serialization',name:'ScriptableObject reference trong save',
   def:'ScriptableObject (ItemSO, SpellSO, QuestSO) không serialize được trực tiếp — chỉ lưu ID (asset name hoặc GUID), khi load thì lookup lại từ Registry. Tránh lưu toàn bộ SO vào save file.',
   code:`// KHÔNG làm — SO không serialize đúng:
// public ItemData equippedWeapon; // lưu thẳng SO

// ĐÚNG — lưu ID, lookup khi load:
public string equippedWeaponID;  // "iron_sword"

// SORegistry — lookup table toàn bộ SO:
public class SORegistry : MonoBehaviour {
    static Dictionary<string, ItemData> items = new();
    public static ItemData GetItem(string id)
        => items.TryGetValue(id, out var item) ? item : null;
}
// Khi load: sheet.weapon = SORegistry.GetItem(save.equippedWeaponID);`,
   tip:'SORegistry là pattern bắt buộc khi dùng SO làm data layer — build nó song song với hệ thống save.'},

  {sec:'save',cat:'sser',step:'Serialization',name:'Encryption & cloud save',
   def:'Save file plain text dễ bị cheat. Encrypt bằng AES nếu cần. Cloud save (Steam Cloud, Google Play Games) sync file tự động giữa thiết bị. Unity Gaming Services cung cấp Cloud Save SDK.',
   code:`// AES encryption đơn giản:
using System.Security.Cryptography;
public static string Encrypt(string plain, string key) {
    using var aes = Aes.Create();
    aes.Key = Encoding.UTF8.GetBytes(key.PadRight(32)[..32]);
    aes.GenerateIV();
    var enc = aes.CreateEncryptor();
    var bytes = Encoding.UTF8.GetBytes(plain);
    var cipher = enc.TransformFinalBlock(bytes, 0, bytes.Length);
    return Convert.ToBase64String(aes.IV.Concat(cipher).ToArray());
}
// Steam Cloud: bật trong Steamworks SDK
// chỉ cần set path, Steam tự sync`,
   tip:'Với indie game đơn người chơi, encrypt là đủ để ngăn cheat casual. Cloud save nên làm trước khi release Steam.'},

  {sec:'save',cat:'sflow',step:'Save flow',name:'SaveManager',
   def:'Singleton quản lý toàn bộ flow save/load — thu thập data từ tất cả ISaveable, serialize, ghi file. Khi load đọc file, deserialize, distribute data về từng ISaveable. Hỗ trợ autosave và quick save.',
   code:`public class SaveManager : MonoBehaviour {
    public static SaveManager Instance { get; private set; }
    List<ISaveable> saveables = new();

    public void RegisterSaveable(ISaveable s) => saveables.Add(s);

    public void SaveGame(int slot) {
        var data = new SaveData();
        data.timestamp = DateTime.Now.ToString();
        foreach (var s in saveables)
            data.genericData[s.SaveID] = s.GetSaveData();
        string json = JsonConvert.SerializeObject(data, Formatting.Indented);
        File.WriteAllText(GetPath(slot), json);
        TakeScreenshot(slot);
    }
    public void LoadGame(int slot) {
        string json = File.ReadAllText(GetPath(slot));
        var data = JsonConvert.DeserializeObject<SaveData>(json);
        foreach (var s in saveables)
            if (data.genericData.TryGetValue(s.SaveID, out var d))
                s.LoadFromData(d);
    }
}`,
   tip:'Load game nên xảy ra SAU khi scene mới đã load xong — dùng SceneManager.LoadScene rồi load data trong Start().'},

  {sec:'save',cat:'sflow',step:'Save flow',name:'Autosave & checkpoint',
   def:'Autosave tự động khi: vào dungeon mới, sau combat, khi rest. Checkpoint là điểm save cố định trong map — player không mất quá nhiều progress khi chết. Hiển thị autosave indicator nhỏ trên màn hình.',
   code:`public class AutosaveManager : MonoBehaviour {
    void Start() {
        CombatEventBus.OnCombatEnd  += _ => TriggerAutosave("post_combat");
        SceneEventBus.OnSceneLoaded += _ => TriggerAutosave("scene_enter");
        RestSystem.OnLongRest       += TriggerAutosave;
    }
    async void TriggerAutosave(string reason) {
        SaveManager.Instance.SaveGame(slotIndex: 0); // slot 0 = autosave
        autosaveIndicator.Show($"Tự động lưu...");
        await Task.Delay(2000);
        autosaveIndicator.Hide();
    }
}`,
   tip:'Autosave sau combat, không trước — tránh trường hợp autosave lúc player đang thua trận không thể cứu vãn.'},

  {sec:'save',cat:'sflow',step:'Save flow',name:'Scene transition & persistence',
   def:'Khi chuyển Scene, data cần được giữ lại — dùng DontDestroyOnLoad cho GameManager + PartyManager + SaveManager, hoặc save/load mini khi transition. Không để data quan trọng nằm trong scene object.',
   code:`// Pattern 1: DontDestroyOnLoad (đơn giản hơn)
// GameManager, PartyManager tồn tại xuyên scene

// Pattern 2: Mini-save trước transition
public IEnumerator TransitionToScene(string sceneName) {
    SaveManager.Instance.SaveTransitionData(); // lưu temp
    yield return FadeOut();
    yield return SceneManager.LoadSceneAsync(sceneName);
    yield return null; // chờ 1 frame để scene init
    SaveManager.Instance.LoadTransitionData(); // restore
    yield return FadeIn();
}`,
   tip:'DontDestroyOnLoad đơn giản hơn nhưng cần cẩn thận với duplicate khi reload scene — luôn check Instance != null.'},

  // ── PHẦN 8: AUDIO, VFX & POLISH ─────────────────────────────────
  {sec:'avfx',cat:'audio',step:'Audio',name:'Audio architecture — tổng quan',
   def:'Unity Audio có 3 component: AudioSource (phát âm thanh trên object), AudioListener (1 cái duy nhất, thường gắn vào camera), AudioMixer (routing, volume, effects). Với RPG cần ít nhất 3 mixer group: Master → Music, SFX, UI.',
   code:`// Mixer Groups:
// Master
//   ├─ Music  (BGM, ambient)
//   ├─ SFX    (combat, footstep, spell)
//   └─ UI     (button click, notification)

// Volume control qua Mixer exposed param:
AudioMixer.SetFloat("MusicVolume", Mathf.Log10(vol) * 20);
// Dùng log10 vì volume hoạt động theo dB (logarithmic)

// Mute khi game pause:
AudioMixer.SetFloat("SFXVolume", isPaused ? -80f : 0f);`,
   tip:'Luôn dùng AudioMixer — không set AudioSource.volume trực tiếp. Mixer cho phép player chỉnh volume riêng từng group.'},

  {sec:'avfx',cat:'audio',step:'Audio',name:'AudioManager & Sound Bank',
   def:'AudioManager là Singleton quản lý tất cả âm thanh — pool AudioSource, lookup SoundBank SO, phát nhạc nền với crossfade. Không gọi AudioSource.PlayOneShot trực tiếp từ mọi nơi trong code.',
   code:`[CreateAssetMenu(menuName="RPG/Audio/Sound Bank")]
public class SoundBankSO : ScriptableObject {
    public SoundEntry[] sounds;
}
[System.Serializable]
public class SoundEntry {
    public string      id;          // "sword_hit", "spell_fire"
    public AudioClip[] variants;    // random một clip
    [Range(0f,1f)] public float volume = 1f;
    [Range(0.8f,1.2f)] public float pitchVariance = 1f;
}
// Phát từ bất kỳ đâu:
AudioManager.Instance.Play("sword_hit", transform.position);`,
   tip:'Dùng variants array (2-3 clip cho cùng 1 SFX) + pitch variance — tránh audio fatigue khi SFX lặp lại nhiều lần.'},

  {sec:'avfx',cat:'audio',step:'Audio',name:'Music crossfade & state',
   def:'Nhạc nền thay đổi theo context — exploration BGM, combat BGM, town BGM, dungeon BGM. Transition mượt bằng crossfade (fade out track cũ, fade in track mới). Dùng 2 AudioSource để crossfade.',
   code:`public IEnumerator CrossfadeTo(AudioClip newClip, float duration=1.5f) {
    // Source A đang phát, source B sẽ phát mới
    sourceB.clip = newClip;
    sourceB.volume = 0f;
    sourceB.Play();
    float t = 0f;
    while (t < duration) {
        t += Time.unscaledDeltaTime;
        float pct = t / duration;
        sourceA.volume = Mathf.Lerp(currentVol, 0f, pct);
        sourceB.volume = Mathf.Lerp(0f, targetVol,  pct);
        yield return null;
    }
    sourceA.Stop();
    (sourceA, sourceB) = (sourceB, sourceA); // swap
}`,
   tip:'Dùng Time.unscaledDeltaTime cho music crossfade — nhạc không bị pause khi game pause (timeScale = 0).'},

  {sec:'avfx',cat:'audio',step:'Audio',name:'Spatial audio & footstep',
   def:'AudioSource có Spatial Blend (0=2D, 1=3D) — âm thanh 3D nhỏ dần theo khoảng cách. Footstep cần surface detection — gạch đá, cỏ, gỗ phát ra clip khác nhau. Dùng Raycast xuống để detect material.',
   code:`void PlayFootstep() {
    // Detect surface bên dưới:
    if (Physics2D.Raycast(transform.position, Vector2.down,
        0.1f, groundLayer, out var hit)) {
        var surface = hit.collider.GetComponent<SurfaceType>();
        var clip = surface?.type switch {
            Surface.Stone => stoneClips,
            Surface.Grass => grassClips,
            Surface.Wood  => woodClips,
            _             => defaultClips
        };
        AudioManager.Instance.Play(clip, transform.position, spatialBlend:0.7f);
    }
}`,
   tip:'Footstep sound design tạo ra immersion lớn nhất so với effort bỏ ra — đừng bỏ qua.'},

  {sec:'avfx',cat:'vfx',step:'VFX',name:'Particle System',
   def:'Unity Particle System tạo hiệu ứng — lửa, khói, tia sáng, máu, impact. Mỗi effect là 1 Prefab với ParticleSystem component. Gọi Play() khi cần, Prefab tự destroy sau khi particle hết.',
   code:`// Spawn VFX từ pool:
public void SpawnEffect(string effectID, Vector3 pos, Quaternion rot) {
    var prefab = vfxBank.Get(effectID);
    var go     = vfxPool.Get(prefab);
    go.transform.SetPositionAndRotation(pos, rot);
    go.GetComponent<ParticleSystem>().Play();

    // Tự trả về pool sau khi xong:
    var ps = go.GetComponent<ParticleSystem>();
    StartCoroutine(ReturnAfter(go, ps.main.duration + ps.main.startLifetime.constantMax));
}
// Khi hit target:
VFXManager.Instance.SpawnEffect("blood_hit",
    hitPoint, Quaternion.LookRotation(hitNormal));`,
   tip:'Pool VFX prefab giống damage number — combat có thể spawn 10+ effect/giây, không pool sẽ lag ngay.'},

  {sec:'avfx',cat:'vfx',step:'VFX',name:'Shader Graph & 2D Lighting (URP)',
   def:'URP hỗ trợ 2D Lighting với Normal Map — tạo chiều sâu cho sprite phẳng. Shader Graph cho phép tạo shader custom không cần code HLSL — dissolve, outline, hit flash, transparency.',
   code:`// Hit flash shader (Shader Graph):
// Input: _FlashColor (Color), _FlashAmount (Float 0-1)
// Node: Lerp(Texture.rgb, _FlashColor, _FlashAmount)
// Output: thay thế màu sprite

// Trigger hit flash trong code:
IEnumerator HitFlash(SpriteRenderer sr) {
    sr.material.SetFloat("_FlashAmount", 1f);
    yield return new WaitForSeconds(0.05f);
    sr.material.SetFloat("_FlashAmount", 0f);
}

// 2D Normal Map: tạo trong Sprite Editor
// Light 2D: Point Light theo dõi torch, Global Light cho ambient`,
   tip:'Hit flash (trắng 0.05s) là visual feedback đơn giản nhất tạo ra cảm giác combat "punch" ngay lập tức.'},

  {sec:'avfx',cat:'vfx',step:'VFX',name:'Sprite animation polish',
   def:'Animation state machine trong Unity Animator — Idle, Walk, Attack, Hit, Death. Blend Tree cho movement (8 hướng isometric). Animation Event để trigger SFX và VFX đúng frame.',
   code:`// Animation Event trong Animation clip:
// Frame 5 của Attack: trigger SFX "sword_swing"
// Frame 8 của Attack: trigger hitbox active
// Frame 12 của Attack: trigger hitbox inactive

// Code xử lý Animation Event:
public class CharacterAnimator : MonoBehaviour {
    public void OnAnimationEvent_SFX(string sfxID)
        => AudioManager.Instance.Play(sfxID, transform.position);
    public void OnAnimationEvent_HitboxActive()
        => hitbox.SetActive(true);
    public void OnAnimationEvent_HitboxInactive()
        => hitbox.SetActive(false);
}`,
   tip:'Animation Events là cách chính xác nhất để sync SFX với animation frame — đừng dùng timer cố định.'},

  {sec:'avfx',cat:'feel',step:'Game feel',name:'Screen shake',
   def:'Rung màn hình khi có impact lớn — critical hit, explosion, boss attack. Implement bằng Cinemachine Impulse Source. Magnitude và duration theo độ mạnh của event.',
   code:`// Cài Cinemachine Impulse Source lên object:
CinemachineImpulseSource impulse;

public void ShakeScreen(float magnitude, float duration) {
    impulse.m_ImpulseDefinition.m_AmplitudeGain = magnitude;
    impulse.m_ImpulseDefinition.m_FrequencyGain = duration;
    impulse.GenerateImpulse();
}
// Dùng theo tier:
// Light hit:    ShakeScreen(0.1f, 0.1f)
// Heavy hit:    ShakeScreen(0.3f, 0.2f)
// Critical:     ShakeScreen(0.5f, 0.3f)
// Boss slam:    ShakeScreen(1.0f, 0.5f)`,
   tip:'Screen shake với Cinemachine tự smooth out tự nhiên — đừng tự translate camera, bị choppy và không controllable.'},

  {sec:'avfx',cat:'feel',step:'Game feel',name:'Hit stop (freeze frame)',
   def:'Pause game cực ngắn (2-4 frame) khi đòn đánh trúng mục tiêu — tạo cảm giác "impact" mạnh mẽ. Dùng Time.timeScale = 0 trong ~0.05s rồi restore. Kết hợp với screen shake và hit flash.',
   code:`public IEnumerator HitStop(float duration = 0.05f) {
    float original = Time.timeScale;
    Time.timeScale = 0f;
    // Dùng unscaled time vì timeScale = 0:
    yield return new WaitForSecondsRealtime(duration);
    Time.timeScale = original;
}
// Trigger khi attack hit:
if (attackResult.hit) {
    StartCoroutine(HitStop(attackResult.critical ? 0.1f : 0.05f));
    StartCoroutine(HitFlash(targetRenderer));
    ShakeScreen(attackResult.critical ? 0.5f : 0.2f);
    SpawnVFX("blood_hit", hitPoint);
    PlaySFX("sword_hit");
}`,
   tip:'Combo HitStop + HitFlash + ScreenShake + SFX = combat feel ngay lập tức. Thiếu 1 trong 4 thứ này thì feel giảm đáng kể.'},

  {sec:'avfx',cat:'feel',step:'Game feel',name:'Tween & animation UI',
   def:'Animate UI element bằng DOTween (thư viện phổ biến nhất) hoặc Unity Animation. Bounce khi nhận item, slide in panel, shake khi input sai password. Micro-animation tạo UI "sống động".',
   code:`// DOTween (cài từ Asset Store, miễn phí):
// using DG.Tweening;

// Panel slide in:
panel.DOAnchorPos(new Vector2(0, 0), 0.3f).SetEase(Ease.OutBack);

// Item bounce khi nhận:
icon.transform.DOPunchScale(Vector3.one * 0.3f, 0.4f, 5, 0.5f);

// Shake khi sai:
inputField.transform.DOShakePosition(0.3f, 10f, 20);

// Fade in:
canvasGroup.DOFade(1f, 0.2f);

// Sequence (nhiều tween nối tiếp):
DOTween.Sequence()
    .Append(icon.DOScale(1.2f, 0.1f))
    .Append(icon.DOScale(1f,   0.1f));`,
   tip:'DOTween Ease.OutBack cho panel open tạo cảm giác "snappy" rất đẹp — dùng cho hầu hết UI animation.'},

  {sec:'avfx',cat:'feel',step:'Game feel',name:'Ambient & atmosphere',
   def:'Môi trường sống động hơn với: ambient sound (tiếng gió, chim, nước chảy theo zone), torch flickering light, NPC idle animation, lá rơi particle. Những chi tiết nhỏ tạo nên immersion lớn.',
   code:`// Ambient sound zone (trigger-based):
public class AmbientZone : MonoBehaviour {
    [SerializeField] AudioClip ambientClip;
    [SerializeField] float     fadeTime = 2f;
    void OnTriggerEnter2D(Collider2D col) {
        if (col.CompareTag("Player"))
            AudioManager.Instance.FadeToAmbient(ambientClip, fadeTime);
    }
}
// Torch flicker (Shader Graph):
// Sin(Time * flickerSpeed + RandomOffset) → Light Intensity
// 2D Point Light gắn vào torch object
// intensity = 0.8 + sin(time*12)*0.15`,
   tip:'Ambient sound zone là effort thấp, impact cao nhất cho atmosphere — một dungeon silent hoàn toàn cảm giác rất "dead".'},

  // ── PHẦN 9: MAP DESIGN & CONTENT ────────────────────────────────
  {sec:'mapcon',cat:'mmap',step:'Map design',name:'Dungeon design principles',
   def:'Dungeon RPG tốt có: mục tiêu rõ ràng (main path), nhánh phụ thưởng exploration, room variety (combat/puzzle/rest/secret), visual landmark để player không bị lạc. Dùng graph trên giấy trước khi tile.',
   code:`// Cấu trúc dungeon cơ bản:
// Entry Room → Corridor → Combat Room
//           ↘ Optional Branch (loot) ↗
//                    ↓
//           Key Room (boss key, NPC)
//                    ↓
//           Boss Room → Exit

// Room types:
// Safe Room:   không có enemy, có chest, rest point
// Combat Room: 1-3 encounter groups
// Secret Room: hidden wall, reward for exploration
// Puzzle Room: alternative to combat`,
   tip:'Mỗi dungeon nên có ít nhất 1 secret room — tạo ra cảm giác reward cho player chịu khó explore.'},

  {sec:'mapcon',cat:'mmap',step:'Map design',name:'Tilemap layer stack',
   def:'Isometric map dùng nhiều Tilemap layer chồng lên nhau theo thứ tự: Ground (floor) → Decal (stain, crack) → Wall → Object (furniture, barrel) → Overhead (ceiling, arch che nhân vật).',
   code:`// Layer stack (thứ tự từ dưới lên):
// [0] Ground      — floor tiles, Z=0
// [1] Ground Decal— blood, stain (optional)
// [2] Wall        — wall tiles, Z=0-2
// [3] Wall Deco   — paintings, torches
// [4] Object      — chest, table, barrel
// [5] Character   — nhân vật (managed by Y-sort)
// [6] Overhead    — arch, ceiling (alpha khi player đứng dưới)

// Overhead fade: khi player enter trigger
//   overhead.GetComponent<SpriteRenderer>().DOFade(0.3f, 0.2f)`,
   tip:'Overhead layer với alpha fade khi player ở dưới là chi tiết nhỏ nhưng tạo ra depth rõ rệt cho isometric map.'},

  {sec:'mapcon',cat:'mmap',step:'Map design',name:'Encounter zone & spawn',
   def:'Thay vì đặt enemy cố định, dùng Encounter Zone — vùng trigger xác định loại enemy và số lượng, spawn khi player vào. Cho phép respawn sau rest, thay đổi composition theo story progress.',
   code:`public class EncounterZone : MonoBehaviour {
    [SerializeField] EncounterSO encounter;
    [SerializeField] bool        respawnOnRest = false;
    bool triggered = false;

    void OnTriggerEnter2D(Collider2D col) {
        if (!col.CompareTag("Player") || triggered) return;
        triggered = true;
        CombatManager.Instance.StartEncounter(encounter, transform.position);
    }
    public void OnLongRest() {
        if (respawnOnRest) triggered = false;
    }
}
[CreateAssetMenu(menuName="RPG/Encounter")]
public class EncounterSO : ScriptableObject {
    public EnemySpawnEntry[] enemies;
    public LootTableSO       lootTable;
    public int               xpReward;
}`,
   tip:'EncounterSO cho phép balance encounter từ Inspector mà không sửa scene — rất quan trọng khi playtesting.'},

  {sec:'mapcon',cat:'mcon',step:'Content',name:'Content pipeline — tổng quan',
   def:'Workflow tạo content cho RPG: Design (thiết kế trên giấy/doc) → Data (tạo SO) → Scene (đặt tile, encounter) → Script (dialogue, quest) → Test → Balance. Lặp lại cho mỗi dungeon/zone.',
   code:`// Content checklist cho 1 dungeon:
// □ Floor plan trên giấy (5-10 phút)
// □ Tilemap ground + wall layer
// □ Encounter zones (3-5 combat)
// □ Chest + loot tables
// □ NPC nếu có (rescue, merchant)
// □ Dialogue nodes
// □ Quest integration (nếu dungeon là quest location)
// □ Ambient sound zone
// □ Lighting (torches, darkness)
// □ Playtest: timing, difficulty, rewards`,
   tip:'Floor plan trên giấy trước khi tile giúp tiết kiệm 50% thời gian làm map — thay đổi trên giấy nhanh hơn xóa tile nhiều.'},

  {sec:'mapcon',cat:'mcon',step:'Content',name:'Loot table',
   def:'ScriptableObject định nghĩa những gì drop từ enemy hoặc chest — list item với xác suất, quantity range, guaranteed drop. Roll ngẫu nhiên khi combat kết thúc. Có thể stack nhiều loot table.',
   code:`[CreateAssetMenu(menuName="RPG/Loot Table")]
public class LootTableSO : ScriptableObject {
    public LootEntry[] entries;
    public int goldMin, goldMax;
}
[System.Serializable]
public class LootEntry {
    public ItemData item;
    [Range(0f,1f)] public float dropChance;
    public int quantityMin = 1, quantityMax = 1;
    public bool isGuaranteed;
}
public List<ItemStack> Roll() {
    var result = new List<ItemStack>();
    foreach (var e in entries) {
        if (e.isGuaranteed || Random.value <= e.dropChance)
            result.Add(new ItemStack(e.item,
                Random.Range(e.quantityMin, e.quantityMax + 1)));
    }
    result.Add(new ItemStack(goldItem, Random.Range(goldMin, goldMax+1)));
    return result;
}`,
   tip:'Guaranteed drop cho boss (unique item) + random drop cho common enemy — tạo ra cảm giác progression rõ ràng.'},

  {sec:'mapcon',cat:'mcon',step:'Content',name:'Item database & naming',
   def:'Tổ chức tất cả ItemSO theo convention rõ ràng — thư mục theo type, tên file theo tier và type. Dùng AssetDatabase.FindAssets() để build runtime registry. Tránh reference trực tiếp bằng tay trong code.',
   code:`// Cấu trúc folder:
// Assets/_Game/ScriptableObjects/Items/
//   Weapons/
//     Swords/  iron_sword.asset, steel_sword.asset
//     Bows/
//   Armor/
//     Chest/
//   Consumables/
//     Potions/

// Naming convention: {tier}_{type}_{variant}
// iron_sword, steel_longsword, mithril_greatsword
// minor_healing_potion, greater_healing_potion

// Runtime registry build:
var guids = AssetDatabase.FindAssets("t:ItemData");`,
   tip:'Naming convention nhất quán từ đầu — 200 item không có quy tắc sẽ mất hàng giờ để tìm khi balance.'},

  {sec:'mapcon',cat:'mbal',step:'Balancing',name:'XP curve & level scaling',
   def:'Tốc độ level lên ảnh hưởng đến toàn bộ feel của game. XP cần cho level N thường theo exponential curve. Enemy XP reward tính theo CR (Challenge Rating). Quá nhanh = player overpowered, quá chậm = boring grind.',
   code:`// Exponential XP curve:
public static int XPRequired(int level) {
    return Mathf.RoundToInt(100 * Mathf.Pow(level, 1.5f));
}
// Level 1→2: 100 XP
// Level 2→3: 283 XP
// Level 3→4: 520 XP
// Level 5→6: 1118 XP

// Enemy XP theo CR (Challenge Rating):
// CR 1/4 goblin: 50 XP
// CR 1   orc:    200 XP
// CR 5   ogre:   1800 XP

// Target: 3-5 combat encounters per level`,
   tip:'Target 3-5 encounters per level cho pacing tốt — ít hơn thì cảm giác level up quá nhanh, mất weight.'},

  {sec:'mapcon',cat:'mbal',step:'Balancing',name:'Combat difficulty scaling',
   def:'Adjust độ khó theo cách tăng số lượng enemy, thêm elite enemy, tăng CR, không nên chỉ tăng HP. Playtest với "God run" (best gear) và "Fresh run" (minimum gear) để tìm range acceptable.',
   code:`// Difficulty tiers:
// Easy:   enemy CR = player level - 2
// Normal: enemy CR = player level
// Hard:   enemy CR = player level + 2

// Elite enemy: normal stats x1.5 HP, x1.25 damage
//              + 1 special ability
//              + 50% more XP/loot

// Boss: CR = player level + 3-4
//       Multiple phases
//       Unique mechanics (shield, summon, enrage)

// Rule of thumb: nếu player dùng hết 50%+ resource
//   mỗi combat → difficulty là đúng`,
   tip:'Playtest combat với nhân vật CHƯA được optimal gear — đó là experience của đa số người chơi thực tế.'},

  // ── PHẦN 10: BUILD, OPTIMIZE & SHIP ─────────────────────────────
  {sec:'build',cat:'bopt',step:'Optimization',name:'Profiler — công cụ cốt lõi',
   def:'Unity Profiler (Window > Analysis > Profiler) record CPU/GPU/memory per frame. Frame Debugger xem từng draw call. Memory Profiler xem allocation. Không đoán mò — profile trước, optimize sau.',
   code:`// Mở Profiler: Window > Analysis > Profiler
// Bật Deep Profile để xem chi tiết method calls
// (Deep Profile chạy chậm hơn — chỉ dùng khi cần)

// Profiler markers trong code:
using Unity.Profiling;
static ProfilerMarker s_combat = new("CombatManager.ResolveTurn");

void ResolveTurn() {
    using (s_combat.Auto()) {
        // code trong này sẽ được track riêng
    }
}
// Frame > 16ms = dưới 60fps → cần optimize
// Tìm peak frame, không average frame`,
   tip:'80% performance issue đến từ 20% code. Profile để tìm đúng chỗ — optimize sai chỗ lãng phí thời gian.'},

  {sec:'build',cat:'bopt',step:'Optimization',name:'Draw call & batching',
   def:'Draw call là lần CPU gửi lệnh render cho GPU — nhiều draw call = CPU bottleneck. Giảm bằng: Sprite Atlas (gộp texture), Static Batching (object không di chuyển), GPU Instancing (nhiều object cùng mesh).',
   code:`// Kiểm tra draw calls: Game View > Stats > Batches

// Sprite Atlas: gộp nhiều sprite → 1 texture
// → giảm từ N draw calls xuống 1 per atlas

// Static Batching: tick "Static" trên GameObject
// → Unity gộp các mesh không di chuyển

// GPU Instancing: nhiều object cùng Material
// Material > Enable GPU Instancing = true

// Target draw calls:
// Mobile:  < 100 draw calls / frame
// Desktop: < 500 draw calls / frame`,
   tip:'Kiểm tra Stats window sau mỗi scene mới — draw call tăng đột biến thường do quên set Sprite Atlas.'},

  {sec:'build',cat:'bopt',step:'Optimization',name:'Object Pooling (runtime)',
   def:'Thay vì Instantiate/Destroy liên tục (tốn GC), tạo pool trước và reuse. Áp dụng cho: enemy prefab, projectile, VFX, damage number, loot drop. Dùng Unity ObjectPool<T> built-in.',
   code:`// Unity built-in ObjectPool (Unity 2021+):
using UnityEngine.Pool;

public class EnemySpawner : MonoBehaviour {
    IObjectPool<EnemyController> pool;

    void Awake() {
        pool = new ObjectPool<EnemyController>(
            createFunc:     () => Instantiate(enemyPrefab).GetComponent<EnemyController>(),
            actionOnGet:    e  => e.gameObject.SetActive(true),
            actionOnRelease:e  => e.gameObject.SetActive(false),
            actionOnDestroy:e  => Destroy(e.gameObject),
            defaultCapacity: 10, maxSize: 50
        );
    }
    public EnemyController Spawn(Vector3 pos) {
        var e = pool.Get();
        e.transform.position = pos;
        e.Initialize(pool); // enemy tự gọi pool.Release khi chết
        return e;
    }
}`,
   tip:'Pool size = max số object xuất hiện cùng lúc + 20% buffer. Quá nhỏ → pool miss, quá lớn → tốn memory.'},

  {sec:'build',cat:'bopt',step:'Optimization',name:'Memory management & GC',
   def:'Garbage Collector (GC) chạy khi cần free memory — gây spike lag. Nguyên nhân phổ biến: string concatenation trong Update(), new allocation trong loop, LINQ trong hot path. Dùng StringBuilder và cache.',
   code:`// BAD — tạo string mới mỗi frame:
void Update() {
    hpText.text = "HP: " + currentHP + "/" + maxHP;
}

// GOOD — chỉ update khi cần:
void OnHPChanged(int cur, int max) {
    hpText.text = $"HP: {cur}/{max}"; // chỉ gọi khi HP đổi
}

// BAD — LINQ trong Update:
var enemies = allObjects.Where(o => o.isEnemy).ToList();

// GOOD — cache và maintain list:
List<Enemy> activeEnemies = new(); // update khi spawn/die

// Check GC allocation: Profiler > Memory > GC Alloc column`,
   tip:'GC spike thường ở UI update và string formatting — profile "GC Alloc" column để tìm nguồn.'},

  {sec:'build',cat:'bprf',step:'Profiling',name:'Frame time budget',
   def:'60fps = 16.67ms per frame. 30fps = 33.33ms. Budget: CPU ~8ms (game logic + physics), Rendering ~6ms, Audio ~1ms, Misc ~1ms. Khi frame over budget, Profiler sẽ chỉ ra đâu chiếm nhiều nhất.',
   code:`// Frame budget breakdown (60fps target):
// Game Logic (Update, AI, Combat):  ~4ms
// Physics:                           ~2ms
// Rendering (draw calls, batching):  ~6ms
// Audio:                             ~1ms
// UI:                                ~1ms
// GC + misc:                         ~2ms
// Total budget: 16ms

// Kiểm tra: Profiler > CPU Usage > hierarchy view
// Sort by "Total" để thấy hàm nào ngốn nhiều nhất
// Sort by "GC Alloc" để tìm allocation`,
   tip:'Đặt target 60fps ngay từ đầu development — optimize sau khi game hoàn thiện thường tốn gấp 3 lần effort.'},

  {sec:'build',cat:'bprf',step:'Profiling',name:'Build size optimization',
   def:'RPG có thể nặng do texture, audio, animation. Giảm size bằng: texture compression, audio compression (MP3/Vorbis), strip unused assets, Addressables để lazy load. Target: < 500MB cho PC indie.',
   code:`// Texture compression:
// PC: BC7 (DXT5 cũ hơn, nhỏ hơn)
// Android: ETC2 (hardware decode)
// iOS: ASTC (tốt nhất, iOS 8+)
// Bật "Generate Mip Maps": TẮT cho UI sprite

// Audio compression:
// Music BGM: Vorbis, quality 70%, Load Type: Streaming
// Short SFX: Vorbis, quality 50%, Load Type: Decompress on Load
// Very short: PCM (không compress), Load In Background: false

// Strip unused assets:
// Edit > Project Settings > Player > Strip Engine Code`,
   tip:'Music streaming là tiết kiệm memory lớn nhất — 1 bài BGM 3 phút có thể 30-50MB nếu không stream.'},

  {sec:'build',cat:'bship',step:'Ship',name:'Build pipeline',
   def:'File > Build Settings → chọn platform → Build. Development Build cho debug (có FPS counter, profiler connection). Release Build tắt debug code. CI/CD với GitHub Actions tự động build khi push.',
   code:`// Build Settings checklist trước release:
// □ Tắt Development Build
// □ Tắt Script Debugging
// □ Strip Engine Code: ON (giảm size)
// □ IL2CPP thay vì Mono (nhanh hơn, khó reverse engineer)
// □ Architecture: x86_64 cho PC
// □ Company Name, Product Name, Version đúng
// □ Icon và splash screen đã set
// □ Tất cả scene trong Build Settings list
// □ Test build trên máy clean (không có Unity)`,
   tip:'Test build trên máy không cài Unity trước khi upload lên Steam — nhiều bug chỉ xuất hiện ở build thực tế.'},

  {sec:'build',cat:'bship',step:'Ship',name:'Steam & itch.io release',
   def:'itch.io: đăng ký miễn phí, upload zip, set price. Tốt để release demo và early access. Steam: $100 Steamworks fee một lần, cần ít nhất 2 tuần review. Cần Store page, screenshots, trailer, capsule art.',
   code:`// Itch.io checklist:
// □ Build zip (không có .pdb debug file)
// □ itch.io page: description, screenshots (min 3), tags
// □ Butler CLI để upload nhanh: butler push build/ game:channel

// Steam checklist:
// □ Steamworks SDK tích hợp (achievements, cloud save)
// □ Store assets: capsule 460x215, header 460x215, screenshots
// □ Trailer 30-90s
// □ SteamworksController.cs: Init(appID)
// □ Submit for review (7-14 ngày)
// □ Build depot upload qua SteamPipe`,
   tip:'Release demo trên itch.io trước Steam — feedback từ người thật trước khi trả $100 Steamworks fee.'},

  {sec:'build',cat:'bship',step:'Ship',name:'Post-release & patch workflow',
   def:'Sau release: theo dõi crash report (Unity Cloud Diagnostics hoặc Sentry), đọc player feedback, prioritize bug fix. Patch nhỏ trong 1-2 tuần đầu. Version number semantic: Major.Minor.Patch.',
   code:`// Version numbering:
// 1.0.0 — initial release
// 1.0.1 — hotfix (bug critical)
// 1.1.0 — minor update (thêm content, fix nhiều bug)
// 2.0.0 — major update (thêm feature lớn, có thể break save)

// Save migration khi update:
// saveData.version = "1.0.0"
// Khi load: if version < "1.1.0" → RunMigration_1_1_0()

// Crash reporting (miễn phí):
// Unity Cloud Diagnostics: Dashboard > Diagnostics
// Sentry (sentry.io): install package, 1 line init`,
   tip:'Chuẩn bị migration code cho save data trước khi release — update 1.1 thay đổi structure mà không có migration = tất cả save cũ bị broken.'},

  // ── PHẦN 11: VERSION CONTROL ─────────────────────────────────────
  {sec:'vcs',cat:'vgit',step:'Git cơ bản',name:'Git — tổng quan cho Unity',
   def:'Git theo dõi lịch sử thay đổi của mọi file. Với Unity có 2 loại file cần quản lý khác nhau: text file (C# script, .meta, scene YAML) merge được bằng Git bình thường, và binary file (texture, audio, prefab lớn) cần Git LFS. Phân biệt 2 loại này là quan trọng nhất.',
   code:`// Cài Git: git-scm.com
// Cài Git LFS: git-lfs.github.com
// Khởi tạo repo:
git init
git lfs install

// Project Unity cần commit CẢ .meta file:
// .meta lưu GUID — mất .meta = mất reference trong prefab/scene

// Kiểm tra status:
git status
git diff --stat  // xem file nào thay đổi`,
   tip:'Unity dùng GUID thay vì tên file để link asset — .meta file chính là cái giữ GUID đó. Không commit .meta = broken reference.'},

  {sec:'vcs',cat:'vgit',step:'Git cơ bản',name:'.gitignore cho Unity',
   def:'Một số thư mục Unity tạo ra tự động và không cần commit — Library/ (cache), Temp/, obj/, Build/. Commit những thứ này làm repo nặng hàng GB không cần thiết. Phải setup .gitignore trước commit đầu tiên.',
   code:`# Unity .gitignore chuẩn:
[Ll]ibrary/
[Tt]emp/
[Oo]bj/
[Bb]uild/
[Bb]uilds/
[Ll]ogs/
[Uu]ser[Ss]ettings/

# IDE:
.vs/
.idea/
*.csproj
*.sln

# KHÔNG ignore: Assets/ và Packages/
# KHÔNG ignore: *.meta (quan trọng!)
# KHÔNG ignore: ProjectSettings/`,
   tip:'Dùng gitignore.io (search "Unity") để generate file chuẩn — tự viết dễ bỏ sót.'},

  {sec:'vcs',cat:'vgit',step:'Git cơ bản',name:'Commit convention',
   def:'Tên commit nhất quán giúp đọc history dễ hơn. Convention phổ biến: type(scope): description. Type gồm: feat (feature mới), fix (sửa bug), art (asset mới/sửa), refactor, docs, chore (config, package).',
   code:`# Commit convention:
# feat(combat): add initiative roll system
# fix(ui): healthbar not updating on crit
# art(tileset): add dungeon floor variants
# refactor(stats): extract modifier calculation
# chore(packages): update Cinemachine to 2.9

# Commit nhỏ, thường xuyên — tốt hơn commit to mỗi tuần:
# Sau mỗi feature nhỏ hoàn chỉnh → commit
# Cuối mỗi buổi làm việc → commit
# Trước khi refactor lớn → commit (safety net)`,
   tip:'Commit nhỏ + message rõ = dễ revert đúng điểm khi có bug. Commit "WIP everything" = vô dụng khi cần rollback.'},

  {sec:'vcs',cat:'vgit',step:'Git cơ bản',name:'Branch strategy cho solo/nhóm nhỏ',
   def:'Solo dev: main branch + feature branch cho mỗi tính năng lớn. Nhóm 2-3 người: thêm develop branch làm integration point. Không làm việc trực tiếp trên main — main luôn là bản stable có thể build được.',
   code:`# Solo workflow:
# main (stable, luôn build được)
# └─ feature/combat-system
# └─ feature/dialogue-ui
# └─ fix/sorting-artifacts

# Tạo branch mới:
git checkout -b feature/inventory-system

# Merge về main sau khi xong:
git checkout main
git merge feature/inventory-system --no-ff
# --no-ff giữ lại merge commit để dễ track

# Xoá branch sau merge:
git branch -d feature/inventory-system`,
   tip:'--no-ff khi merge giữ lại "bubble" commit — history rõ ràng hơn fast-forward, dễ revert cả feature.'},

  {sec:'vcs',cat:'vart',step:'Asset & Binary',name:'Git LFS — Large File Storage',
   def:'Git không hiệu quả với binary file lớn (texture, audio, prefab compiled) — mỗi lần thay đổi lưu toàn bộ file mới, repo phình to nhanh. Git LFS lưu pointer nhỏ trong repo, file thực tế trên LFS server.',
   code:`# Cài và khởi tạo LFS:
git lfs install

# Track các loại binary:
git lfs track "*.png"
git lfs track "*.jpg"
git lfs track "*.psd"
git lfs track "*.wav"
git lfs track "*.mp3"
git lfs track "*.ogg"
git lfs track "*.fbx"
git lfs track "*.prefab"   # prefab lớn
git lfs track "*.unity"    # scene file

# Kiểm tra file đang track LFS:
git lfs ls-files

# .gitattributes tự được tạo — commit nó vào repo`,
   tip:'Track .gitattributes ngay sau git lfs install — file này định nghĩa rule LFS cho toàn team/máy khác.'},

  {sec:'vcs',cat:'vart',step:'Asset & Binary',name:'Phân loại tài nguyên theo cách quản lý',
   def:'5 loại tài nguyên cần chiến lược quản lý khác nhau trong Git: (1) Source code — text, merge được. (2) Scene/Prefab — YAML text nhưng conflict khó resolve. (3) Art source (PSD, AI) — binary, lưu LFS. (4) Compiled asset (texture, audio) — binary, LFS. (5) External dependency (package) — quản lý qua Package Manager.',
   code:`# Phân loại và cách lưu:

# [TEXT — Git thường]
# *.cs, *.asmdef, *.json, *.xml, *.md
# *.meta (QUAN TRỌNG — luôn commit)
# ProjectSettings/*.asset

# [YAML TEXT — Git thường, nhưng cẩn thận merge]
# *.unity (scene), *.prefab, *.asset (SO nhỏ)
# → Bật Force Text serialization

# [BINARY — Git LFS bắt buộc]
# *.png, *.jpg, *.psd, *.ai, *.svg (raster)
# *.wav, *.mp3, *.ogg, *.aif
# *.fbx, *.obj, *.blend (3D model)
# *.ttf, *.otf (font)

# [KHÔNG commit — ignore]
# Library/, Temp/, Build/, *.csproj`,
   tip:'Rule đơn giản: mọi thứ bạn tạo bằng phần mềm khác (Photoshop, Audacity, Blender) → LFS. Code và config → Git thường.'},

  {sec:'vcs',cat:'vart',step:'Asset & Binary',name:'Force Text serialization',
   def:'Unity mặc định serialize scene và prefab dạng binary — Git không thể diff hay merge được. Chuyển sang Force Text để scene/prefab lưu dạng YAML text, Git có thể đọc và diff được (dù vẫn khó merge khi conflict).',
   code:`// Bật Force Text:
// Edit > Project Settings > Editor
// Asset Serialization > Mode = Force Text

// Sau khi bật: mở lại từng scene/prefab để re-serialize
// (hoặc dùng script batch re-serialize)

// Kết quả: .unity và .prefab thành YAML text
// Có thể git diff để thấy thay đổi:
// git diff HEAD Assets/Scenes/Dungeon.unity
// → thấy object nào được thêm/xoá/sửa`,
   tip:'Force Text là setting BẮT BUỘC trước commit đầu tiên — đổi sau khi đã có lịch sử commit rất phức tạp.'},

  {sec:'vcs',cat:'vart',step:'Asset & Binary',name:'Asset Store package & Packages/ folder',
   def:'Unity packages (từ Package Manager) lưu trong Library/ (ignore) và Packages/manifest.json. Asset Store assets download vào Library local — không commit. Chỉ commit manifest.json để recreate đúng phiên bản.',
   code:`// Packages/manifest.json — commit cái này:
{
  "dependencies": {
    "com.unity.cinemachine": "2.9.7",
    "com.unity.inputsystem": "1.6.3",
    "com.unity.textmeshpro": "3.0.6",
    "com.unity.2d.tilemap": "1.0.0"
  }
}
// Khi clone repo mới: Unity tự download packages

// Asset Store assets (mua từ store):
// → KHÔNG commit vào Git (vi phạm license + nặng)
// → Lưu .unitypackage backup ở nơi khác
// → Document trong README: "Required: A* Pathfinding Pro v4.x"`,
   tip:'Ghi rõ asset store dependencies vào README — người clone repo (hoặc chính bạn sau 6 tháng) sẽ biết cần mua/import gì.'},

  {sec:'vcs',cat:'vcode',step:'Code & Scene',name:'Scene merge conflict',
   def:'Khi 2 người sửa cùng 1 scene (hoặc bạn sửa từ 2 branch khác nhau), Git tạo conflict markers trong YAML. Unity có Smart Merge tool (UnityYAMLMerge) giải quyết nhiều conflict tự động. Cách tốt nhất là tránh conflict bằng ownership.',
   code:`# Cài UnityYAMLMerge làm merge tool:
# .gitconfig:
[merge]
    tool = unityyamlmerge
[mergetool "unityyamlmerge"]
    trustExitCode = false
    cmd = 'C:/Program Files/Unity/Hub/Editor/6000.x/Editor/Data/Tools/UnityYAMLMerge.exe' merge -p "$BASE" "$REMOTE" "$LOCAL" "$MERGED"

# Khi có conflict:
git mergetool  # Unity tự resolve nếu có thể

# Tránh conflict tốt hơn là resolve:
# Solo: 1 scene per branch
# Nhóm: mỗi người own 1 scene riêng`,
   tip:'Conflict trong scene file rất khó đọc — tốt nhất là workflow tránh 2 người sửa cùng scene cùng lúc.'},

  {sec:'vcs',cat:'vcode',step:'Code & Scene',name:'Prefab override & conflict',
   def:'Prefab Variant và Override lưu dạng YAML — conflict khi 2 branch sửa cùng prefab. Chiến lược: chia nhỏ prefab (Character, Equipment, AI là 3 prefab riêng), không 1 God Prefab chứa tất cả.',
   code:`// Cấu trúc prefab tránh conflict:
// Enemy_Base.prefab        → stats, animator (ít thay đổi)
//   ├─ Goblin.prefab       → variant của Base
//   └─ Orc.prefab          → variant của Base

// Sửa visual? → chỉ sửa Goblin.prefab
// Sửa AI?     → chỉ sửa EnemyAI.cs (code, không phải prefab)
// Sửa stats?  → chỉ sửa GoblinStats.asset (SO riêng)

// Nested Prefab tốt hơn monolithic:
// Player.prefab chứa:
//   → PlayerVisual.prefab (artist owns)
//   → PlayerCombat.prefab (gameplay programmer owns)`,
   tip:'Nested prefab + SO data tách biệt = mỗi file có 1 owner rõ ràng → conflict giảm đáng kể khi làm nhóm.'},

  {sec:'vcs',cat:'vcode',step:'Code & Scene',name:'.asmdef (Assembly Definition)',
   def:'Chia code thành nhiều Assembly Definition File — mỗi .asmdef là 1 C# assembly độc lập. Giúp: compile time nhanh hơn (chỉ recompile assembly bị thay đổi), enforce dependency rõ ràng, dễ test.',
   code:`// Cấu trúc asmdef cho RPG:
// Assets/_Game/Scripts/
//   Core/          → RPG.Core.asmdef       (no dependencies)
//   Combat/        → RPG.Combat.asmdef     (depends: Core)
//   UI/            → RPG.UI.asmdef         (depends: Core, Combat)
//   Dialogue/      → RPG.Dialogue.asmdef   (depends: Core)
//   Tests/         → RPG.Tests.asmdef      (test only)

// Tạo: chuột phải folder > Create > Assembly Definition
// Lợi ích:
// - Sửa UI code → chỉ compile RPG.UI (nhanh hơn)
// - Combat không thể import UI namespace (enforce separation)`,
   tip:'.asmdef giảm compile time đáng kể khi project lớn — RPG với 100+ script mà không có asmdef = compile 10-20s mỗi lần.'},

  {sec:'vcs',cat:'vflow',step:'Workflow',name:'GitHub/GitLab repo setup cho Unity',
   def:'Setup đúng từ đầu tiết kiệm nhiều headache sau này. Checklist: tạo repo với .gitignore Unity, bật LFS, set Force Text serialization, tạo nhánh main làm default, protect main branch.',
   code:`# Thứ tự setup từ đầu:
# 1. Tạo repo trên GitHub/GitLab (chọn gitignore: Unity)
# 2. Clone về máy
# 3. git lfs install  (trong thư mục repo)
# 4. Tạo Unity project VÀO TRONG thư mục repo
# 5. Edit > Project Settings > Editor > Force Text
# 6. Tạo .gitattributes cho LFS tracks
# 7. git add . && git commit -m "chore: initial Unity project"
# 8. git push

# GitHub repo settings:
# Settings > Branches > Add rule: main
# ✓ Require pull request before merging (nếu nhóm)
# ✓ Require status checks (nếu có CI)`,
   tip:'Tạo repo TRƯỚC khi tạo Unity project — tránh phải setup gitignore và LFS sau khi đã có hàng nghìn file.'},

  {sec:'vcs',cat:'vflow',step:'Workflow',name:'Git workflow hàng ngày',
   def:'Quy trình làm việc hàng ngày để tránh mất data và conflict: pull trước khi bắt đầu, commit thường xuyên khi feature nhỏ xong, push cuối buổi làm. Không để uncommitted changes qua đêm nếu có thể.',
   code:`# Đầu buổi làm việc:
git pull origin main          # lấy changes mới nhất
git checkout -b feature/xxx   # tạo branch mới nếu cần

# Trong khi làm:
git status                    # xem gì đang thay đổi
git add Assets/Scripts/Combat/TurnManager.cs
git add Assets/Scripts/Combat/TurnManager.cs.meta
git commit -m "feat(combat): implement turn order queue"

# Cuối buổi:
git push origin feature/xxx

# Merge về main khi feature xong:
git checkout main
git pull origin main
git merge feature/xxx --no-ff
git push origin main`,
   tip:'Luôn add .meta cùng với file C# — commit thiếu .meta = người khác clone về bị broken reference.'},

  {sec:'vcs',cat:'vflow',step:'Workflow',name:'Tag & Release versioning',
   def:'Dùng Git Tag để đánh dấu mỗi release — v1.0.0, v1.0.1-hotfix, v1.1.0. Tag giúp rollback về đúng version release, tạo GitHub Release với changelog, và link với build artifact.',
   code:`# Tạo tag khi release:
git tag -a v1.0.0 -m "Initial release"
git push origin v1.0.0

# Semantic versioning: MAJOR.MINOR.PATCH
# v1.0.0 → launch
# v1.0.1 → hotfix bug crash
# v1.1.0 → thêm content, fix nhiều bug
# v2.0.0 → thay đổi lớn (có thể break save)

# Xem tất cả tags:
git tag -l

# Checkout về tag cũ để debug:
git checkout v1.0.0 -b hotfix/v1.0.0-investigate`,
   tip:'Tag mỗi lần upload build lên Steam/itch.io — biết chính xác commit nào là bản người chơi đang dùng.'},

  {sec:'vcs',cat:'vflow',step:'Workflow',name:'Stash — lưu tạm changes',
   def:'git stash lưu tạm changes chưa commit để bạn có thể switch branch hoặc pull mà không bị conflict. Khi quay lại thì pop ra. Hữu ích khi đang làm dở feature nhưng cần fix bug hotfix khẩn.',
   code:`# Đang làm dở feature, cần fix bug gấp:
git stash push -m "WIP: inventory drag-drop half done"

# Switch sang main để fix bug:
git checkout main
git checkout -b fix/crash-on-load
# ... fix bug ...
git commit -m "fix: null ref crash on scene load"
git checkout main && git merge fix/crash-on-load

# Quay lại feature đang làm dở:
git checkout feature/inventory
git stash pop    # restore changes

# Xem danh sách stash:
git stash list`,
   tip:'Đặt tên cho stash (-m) — stash list không có tên rất khó biết cái nào là gì sau vài ngày.'},

  {sec:'vcs',cat:'vci',step:'CI/CD & Backup',name:'GitHub Actions cho Unity',
   def:'CI/CD tự động build và test mỗi khi push code. GameCI (game.ci) cung cấp GitHub Actions workflow sẵn cho Unity — build PC/Android/WebGL, chạy unit test, upload artifact tự động.',
   code:`# .github/workflows/build.yml
name: Build Unity Project
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }   # checkout kèm LFS files

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: \${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: StandaloneWindows64

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: build/StandaloneWindows64`,
   tip:'CI build thất bại = biết ngay có code break build — tốt hơn là phát hiện sau 2 tuần khi chuẩn bị release.'},

  {sec:'vcs',cat:'vci',step:'CI/CD & Backup',name:'Unity License trong CI',
   def:'Unity cần license để build — CI server cần Personal hoặc Pro license. GameCI hỗ trợ cả 2. Với Personal license: activate một lần, lưu license file vào GitHub Secrets. Không bao giờ commit license file vào repo.',
   code:`# Lấy Unity license file để dùng trong CI:
# Bước 1: chạy activation workflow một lần
# game-ci/unity-request-activation-file action
# → tạo file .ulf (Unity License File)

# Bước 2: lưu vào GitHub Secrets:
# GitHub repo > Settings > Secrets > New secret
# UNITY_LICENSE = (paste nội dung file .ulf)
# UNITY_EMAIL   = email tài khoản Unity
# UNITY_PASSWORD= password tài khoản Unity

# Bước 3: dùng trong workflow:
env:
  UNITY_LICENSE:  \${{ secrets.UNITY_LICENSE }}
  UNITY_EMAIL:    \${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: \${{ secrets.UNITY_PASSWORD }}`,
   tip:'License Personal free hoạt động tốt cho CI — không cần trả tiền Pro chỉ để build tự động.'},

  {sec:'vcs',cat:'vci',step:'CI/CD & Backup',name:'Backup strategy — 3-2-1 rule',
   def:'Rule 3-2-1: 3 bản copy, 2 loại storage khác nhau, 1 bản offsite. Với game dev: Git remote (GitHub/GitLab) là offsite backup chính. Thêm cloud storage cho LFS file lớn và asset source (Photoshop, Blender).',
   code:`# Backup strategy cho indie solo dev:

# Primary: Git + Git LFS trên GitHub
#   → Tất cả code, scene, prefab, compiled asset
#   → LFS cho binary lớn (texture, audio)

# Secondary: External HDD hàng tuần
#   → Full project folder bao gồm Library/
#   → Phục hồi nhanh hơn clone + reimport

# Asset source files (PSD, AI, Blend):
#   → Google Drive hoặc Dropbox (nếu không dùng LFS)
#   → Hoặc Git LFS nếu plan trả phí storage

# GitHub free: 1GB LFS storage, 1GB/tháng bandwidth
# GitHub Pro: 2GB LFS storage
# Vượt quá: mua thêm data pack ($5/50GB)`,
   tip:'GitHub free 1GB LFS thường đủ cho game indie nhỏ — theo dõi usage trong repo Settings > Billing.'},

  {sec:'vcs',cat:'vci',step:'CI/CD & Backup',name:'GitLab vs GitHub cho game dev',
   def:'Cả 2 đều hỗ trợ Git LFS. GitHub phổ biến hơn, ecosystem lớn hơn (GameCI chạy tốt), free private repo. GitLab có CI/CD mạnh hơn built-in, self-hosted option. Với solo indie: GitHub là lựa chọn đơn giản hơn.',
   code:`# So sánh nhanh:

# GitHub:
# + Phổ biến hơn, nhiều tutorial
# + GameCI hỗ trợ tốt hơn
# + GitHub Actions dễ dùng
# + Free: unlimited private repos, 2000 CI min/tháng
# - LFS free chỉ 1GB storage

# GitLab:
# + CI/CD pipeline mạnh hơn built-in
# + Self-hosted (hoàn toàn kiểm soát)
# + Free: 5GB LFS storage
# - Ít tutorial Unity hơn
# - GameCI cần config thêm

# Recommendation cho solo RPG dev:
# → GitHub + Git LFS (đơn giản nhất để bắt đầu)
# → Upgrade storage nếu cần ($5/50GB/tháng)`,
   tip:'Bắt đầu với GitHub — dễ tìm help nhất. Migrate sang GitLab self-hosted sau nếu cần kiểm soát nhiều hơn.'},

  // ── PHẦN 12: XỬ LÝ 3D ──────────────────────────────────────────
  {sec:'td',cat:'3dcore',step:'3D Core',name:'3D Coordinate system & tay phải/trái',
   def:'Unity dùng hệ toạ độ tay trái: X sang phải, Y lên trên, Z hướng vào màn hình (forward). Khác với 3D software như Blender (tay phải, Z lên). Khi import model từ Blender sẽ bị xoay -90° trục X — cần bù lại hoặc fix khi export.',
   code:`// Trục Unity 3D:
// X → phải    (Right)
// Y → lên     (Up)
// Z → vào     (Forward)

// Vector directions:
Vector3.forward  = (0, 0,  1)  // hướng vào màn hình
Vector3.back     = (0, 0, -1)
Vector3.up       = (0,  1, 0)
Vector3.right    = (1, 0,  0)

// Blender export fix:
// Apply rotation trong Blender trước khi export FBX
// hoặc: wrapper empty GameObject xoay (90, 0, 0)`,
   tip:'Luôn Apply All Transforms trong Blender trước khi export FBX — tránh model import bị nghiêng 90°.'},

  {sec:'td',cat:'3dcore',step:'3D Core',name:'Mesh & MeshRenderer',
   def:'Mesh là dữ liệu hình học 3D — vertices, triangles, UV, normals. MeshRenderer render mesh với Material. MeshFilter giữ reference đến Mesh. Bộ ba này là nền tảng của mọi object 3D trong Unity.',
   code:`// 3 component cơ bản của object 3D:
// MeshFilter    → giữ Mesh data (hình dạng)
// MeshRenderer  → render với Material (màu/texture)
// Collider      → vật lý (BoxCollider, MeshCollider...)

// Tạo mesh đơn giản bằng code:
var mesh = new Mesh();
mesh.vertices  = new Vector3[] { v0, v1, v2, v3 };
mesh.triangles = new int[]     { 0, 1, 2, 0, 2, 3 };
mesh.uv        = new Vector2[] { uv0, uv1, uv2, uv3 };
mesh.RecalculateNormals();
GetComponent<MeshFilter>().mesh = mesh;`,
   tip:'MeshCollider chính xác hơn BoxCollider nhưng nặng hơn nhiều — chỉ dùng MeshCollider cho terrain/environment phức tạp.'},

  {sec:'td',cat:'3dcore',step:'3D Core',name:'Transform trong 3D',
   def:'Giống 2D nhưng có thêm trục Z. Rotation dùng Quaternion (tránh Gimbal Lock) hoặc Euler angles (dễ đọc). Local space vs World space quan trọng hơn trong 3D vì object thường có parent phức tạp.',
   code:`// Di chuyển theo hướng local (forward của object):
transform.Translate(Vector3.forward * speed * Time.deltaTime);

// Di chuyển theo world space:
transform.position += Vector3.forward * speed * Time.deltaTime;

// Xoay mượt bằng Quaternion:
transform.rotation = Quaternion.Slerp(
    transform.rotation,
    targetRotation,
    rotSpeed * Time.deltaTime);

// Nhìn về phía target:
transform.LookAt(target.position);`,
   tip:'Dùng Quaternion.Slerp cho rotation mượt — Lerp với Euler angle tạo ra path không tự nhiên.'},

  {sec:'td',cat:'3dcore',step:'3D Core',name:'Camera 3D — Perspective vs Orthographic',
   def:'3D game thường dùng Perspective camera — vật xa nhỏ hơn vật gần, tạo chiều sâu. Field of View (FOV) quyết định góc nhìn. FOV thấp (40-50°) = telephoto, ít distortion. FOV cao (80-90°) = wide angle, nhiều distortion.',
   code:`// Perspective camera:
Camera.main.fieldOfView = 60f;  // default 60°
Camera.main.nearClipPlane = 0.1f;
Camera.main.farClipPlane  = 1000f;

// FOV theo game type:
// First Person:   60-90° (rộng để thấy xung quanh)
// Third Person:   50-65° (cân bằng)
// Cinematic:      30-40° (telephoto, đẹp)
// Racing:         80-100° (cảm giác speed)

// Depth of Field (URP Post Processing):
// Blur vật ở xa/gần để tạo cảm giác cinematic`,
   tip:'FOV 60° là sweet spot cho third-person RPG 3D — đủ rộng để thấy môi trường, không quá nhiều distortion.'},

  {sec:'td',cat:'3dren',step:'3D Rendering',name:'Material & Shader trong 3D',
   def:'Material quyết định bề mặt trông như thế nào — màu, texture, độ bóng, metallic. URP dùng Lit shader mặc định với PBR (Physically Based Rendering). Các thuộc tính chính: Albedo, Normal Map, Metallic, Smoothness, Emission.',
   code:`// PBR Material properties:
// Albedo (Base Color): màu/texture cơ bản
// Normal Map:  giả lập chi tiết bề mặt không cần poly
// Metallic:    0 = plastic/wood, 1 = kim loại
// Smoothness:  0 = matte/rough, 1 = bóng loáng
// Emission:    tự phát sáng (torch, glowing rune)

// Set material property bằng code:
renderer.material.SetColor("_BaseColor", Color.red);
renderer.material.SetFloat("_Metallic", 0.8f);
renderer.material.SetTexture("_BaseMap", newTexture);`,
   tip:'Normal Map tạo ra sự khác biệt lớn nhất về visual quality so với chi phí performance — luôn bake normal map cho prop quan trọng.'},

  {sec:'td',cat:'3dren',step:'3D Rendering',name:'Lighting 3D — Real-time vs Baked',
   def:'Real-time lighting tính toán mỗi frame — chính xác nhưng tốn GPU. Baked lighting tính toán trước (Lightmap) — nhanh hơn nhưng static, không thay đổi khi runtime. RPG 3D thường dùng kết hợp: baked cho environment, real-time cho dynamic object.',
   code:`// Light types:
// Directional: ánh sáng mặt trời (1 direction toàn scene)
// Point:        bóng đèn (toả đều mọi hướng, có range)
// Spot:         đèn pin/torch (hình nón, có angle)
// Area:         mảng ánh sáng (chỉ baked, không real-time)

// Bake Lightmap:
// Object > Static > Contribute GI = true
// Window > Rendering > Lighting > Generate Lighting

// Mixed mode: Direct = real-time, Indirect = baked
// Tốt nhất cho RPG: character real-time, dungeon baked`,
   tip:'Bake lightmap cho dungeon/environment tĩnh giúp tăng FPS đáng kể — lighting đẹp hơn real-time nhờ GI được tính toán kỹ hơn.'},

  {sec:'td',cat:'3dren',step:'3D Rendering',name:'Shadow & LOD',
   def:'Shadow tốn GPU đáng kể — giới hạn shadow distance và quality theo platform. LOD (Level of Detail) tự động dùng mesh đơn giản hơn khi object ở xa — giảm vertex count mà player không nhận ra sự khác biệt.',
   code:`// Shadow settings (URP):
// Project Settings > Quality > Shadows
// Shadow Distance: 50-100m cho RPG indoor
// Cascade Count: 2-4 (nhiều hơn = mượt hơn, nặng hơn)

// LOD Group:
LODGroup lodGroup = obj.AddComponent<LODGroup>();
LOD[] lods = new LOD[3];
lods[0] = new LOD(0.6f, highPolyRenderers);   // > 60% screen
lods[1] = new LOD(0.2f, midPolyRenderers);    // > 20% screen
lods[2] = new LOD(0.05f, lowPolyRenderers);   // > 5% screen
lodGroup.SetLODs(lods);
lodGroup.RecalculateBounds();`,
   tip:'LOD là optimization quan trọng nhất cho open world / dungeon lớn — giảm 60-70% vertex count ở khoảng cách vừa mà mắt không thấy.'},

  {sec:'td',cat:'3dren',step:'3D Rendering',name:'Post Processing (URP)',
   def:'Hiệu ứng xử lý sau khi render xong frame — Bloom (ánh sáng lan ra), Color Grading (chỉnh màu tổng thể), Ambient Occlusion (bóng tối ở góc khuất), Depth of Field, Vignette. Tạo ra visual style đặc trưng.',
   code:`// Thêm Volume component vào scene:
// GameObject > Volume > Global Volume

// Các effect quan trọng cho RPG 3D:
// Bloom:            torch và magic glow
// Color Grading:    warm = town, cold = dungeon, red = combat
// SSAO:             ambient occlusion realtime (nặng)
// Depth of Field:   blur foreground/background (cinematic)
// Vignette:         tối góc màn hình (thêm tension)

// Thay đổi runtime (ví dụ: khi combat bắt đầu):
Volume.profile.TryGet(out ColorAdjustments ca);
ca.saturation.value = -30f; // desaturate khi nguy hiểm`,
   tip:'Color Grading là cách nhanh nhất tạo ra mood khác nhau cho zone — warm amber cho town, cool blue cho ice dungeon.'},

  {sec:'td',cat:'3dphys',step:'3D Physics',name:'Rigidbody 3D vs 2D',
   def:'Rigidbody (3D) hoạt động trong không gian 3 chiều đầy đủ — gravity, drag, angular drag, constraints. Khác Rigidbody2D: không có trục Z lock mặc định, cần set Freeze Position/Rotation constraints để tránh object lăn bất ngờ.',
   code:`Rigidbody rb = GetComponent<Rigidbody>();

// Di chuyển character 3D đúng cách:
rb.MovePosition(rb.position + moveDir * speed * Time.fixedDeltaTime);

// Constraints để tránh lăn:
rb.constraints = RigidbodyConstraints.FreezeRotationX
               | RigidbodyConstraints.FreezeRotationZ;
// Chỉ cho xoay trục Y (nhân vật quay trái/phải)

// Nhảy:
rb.AddForce(Vector3.up * jumpForce, ForceMode.Impulse);`,
   tip:'FreezeRotation X và Z cho character controller 3D — không lock thì nhân vật ngã lăn mỗi khi va vào wall.'},

  {sec:'td',cat:'3dphys',step:'3D Physics',name:'CharacterController vs Rigidbody',
   def:'CharacterController là component đặc biệt cho nhân vật 3D — không dùng physics engine, di chuyển bằng Move(). Không bị physics tác động (không bị đẩy). Dùng khi muốn kiểm soát movement hoàn toàn. Rigidbody dùng khi cần physics tương tác thực sự.',
   code:`// CharacterController:
CharacterController cc = GetComponent<CharacterController>();

void Update() {
    Vector3 move = new Vector3(input.x, 0, input.y);
    move = Camera.main.transform.TransformDirection(move);
    move.y = 0;

    // Apply gravity thủ công:
    verticalVelocity += Physics.gravity.y * Time.deltaTime;
    move.y = verticalVelocity;

    cc.Move(move * speed * Time.deltaTime);
    if (cc.isGrounded) verticalVelocity = -0.5f;
}`,
   tip:'CharacterController là lựa chọn chuẩn cho RPG/action game 3D — kiểm soát movement tốt hơn Rigidbody rất nhiều.'},

  {sec:'td',cat:'3dphys',step:'3D Physics',name:'Raycast 3D',
   def:'Bắn tia từ điểm A theo hướng nào đó, phát hiện va chạm đầu tiên. Dùng cho: phát hiện ground (isGrounded), tầm nhìn enemy (Line of Sight), click chọn object, projectile hit. Trong 3D thường dùng nhiều hơn 2D.',
   code:`// Ground check:
bool isGrounded = Physics.Raycast(
    transform.position, Vector3.down, 0.1f, groundLayer);

// Click to select object:
Ray ray = Camera.main.ScreenPointToRay(Input.mousePosition);
if (Physics.Raycast(ray, out RaycastHit hit, 100f)) {
    Debug.Log("Hit: " + hit.collider.name);
    Debug.DrawLine(ray.origin, hit.point, Color.red);
}

// Line of Sight (enemy AI):
bool canSee = !Physics.Linecast(
    eyePosition, target.position, obstacleLayers);`,
   tip:'Dùng LayerMask trong Raycast — không mask thì ray hit chính bản thân mình trước, gây bug khó debug.'},

  {sec:'td',cat:'3danim',step:'3D Animation',name:'Animator & Animation Clip 3D',
   def:'Animator Controller quản lý state machine animation giống 2D nhưng phức tạp hơn — Blend Tree cho locomotion (walk/run theo speed), Avatar Mask để animate chỉ upper body khi tấn công. Animation Rigging cho IK (inverse kinematics).',
   code:`// Animator parameters:
animator.SetFloat("Speed",   moveSpeed);
animator.SetBool("IsGrounded", isGrounded);
animator.SetTrigger("Attack");

// Blend Tree cho locomotion:
// Parameter: Speed (float 0-1)
// Speed 0:   Idle clip
// Speed 0.5: Walk clip
// Speed 1:   Run clip
// → Unity tự blend mượt giữa các clip

// Avatar Mask — chỉ animate upper body khi đánh:
// Layer "UpperBody" Weight=1, Avatar Mask=UpperBody
// → chân vẫn đi bình thường, tay đánh riêng`,
   tip:'Blend Tree cho locomotion là chuẩn cho mọi game 3D có nhân vật di chuyển — không dùng separate clip Walk/Run riêng lẻ.'},

  {sec:'td',cat:'3danim',step:'3D Animation',name:'Humanoid Avatar & Retargeting',
   def:'Unity có Humanoid rig system cho phép reuse animation giữa các character khác nhau — gọi là Animation Retargeting. Import model với Animation Type = Humanoid, Unity tự map bone. 1 bộ animation walk/run/attack có thể dùng cho Warrior, Mage, NPC.',
   code:`// Import settings cho Humanoid character:
// Model > Rig > Animation Type = Humanoid
// Avatar Definition = Create From This Model
// Unity tự map bone thành Avatar

// Retargeting: dùng animation từ character khác
// Animator > Controller: assign cùng 1 Animator Controller
// Animation clip tự adapt theo skeleton mỗi character

// Free motion capture animations:
// Mixamo (mixamo.com) — Adobe, miễn phí
// Export: FBX for Unity, With Skin, 30fps`,
   tip:'Mixamo miễn phí có hàng trăm animation humanoid chất lượng tốt — đủ dùng cho RPG indie mà không cần bake motion capture.'},

  {sec:'td',cat:'3danim',step:'3D Animation',name:'Inverse Kinematics (IK)',
   def:'IK tính toán rotation của joint chain để đầu cuối (hand, foot) đến được vị trí target. Dùng cho: hand đặt đúng lên bàn/tường, foot đặt đúng lên mặt đất không đồng đều, mắt nhìn theo target. Unity Animation Rigging package.',
   code:`// Animation Rigging package:
// Window > Package Manager > Animation Rigging

// Two Bone IK (hand IK):
// Rig > Add Rig > Add Two Bone IK Constraint
// Root: Shoulder, Mid: Elbow, Tip: Hand
// Target: empty GameObject follow target position

// Foot IK (đặt chân đúng mặt đất):
void OnAnimatorIK(int layerIndex) {
    // Left foot:
    animator.SetIKPositionWeight(AvatarIKGoal.LeftFoot, 1f);
    if (Physics.Raycast(leftFootPos, Vector3.down, out var hit))
        animator.SetIKPosition(AvatarIKGoal.LeftFoot, hit.point);
}`,
   tip:'Foot IK là chi tiết nhỏ nhưng tạo ra sự khác biệt lớn khi nhân vật đứng trên địa hình không bằng phẳng.'},

  {sec:'td',cat:'3ddiff',step:'Khác 2D',name:'NavMesh trong 3D (đúng cách dùng)',
   def:'NavMesh là hệ thống pathfinding 3D built-in của Unity — bake mesh đi được từ geometry của scene. AI Agent di chuyển trên NavMesh tự tránh obstacle. Trong 3D dùng được tốt (khác với 2D isometric đã đề cập ở Phần 2 không nên dùng).',
   code:`// Bake NavMesh:
// Window > AI > Navigation
// Bake tab > Bake button
// Object cần bake: Static = Navigation Static

// NavMeshAgent trên enemy:
NavMeshAgent agent = GetComponent<NavMeshAgent>();
agent.speed        = 3.5f;
agent.stoppingDistance = 1.5f;

// Di chuyển đến target:
agent.SetDestination(player.position);

// Kiểm tra đã đến nơi:
bool arrived = !agent.pathPending
    && agent.remainingDistance <= agent.stoppingDistance;`,
   tip:'NavMesh bake lại mỗi khi thay đổi geometry — nếu dungeon có dynamic door/wall cần dùng NavMeshObstacle thay vì rebake.'},

  {sec:'td',cat:'3ddiff',step:'Khác 2D',name:'3D vs 2D — những thứ thay đổi',
   def:'Chuyển sang 3D không phải học lại từ đầu — phần lớn concept giữ nguyên. Những thứ thực sự khác: Physics (3D thay vì 2D component), Camera (Perspective thay vì Orthographic), Collider (Box/Capsule/Mesh thay vì 2D variant), Raycast (không cần suffix 2D).',
   code:`// Mapping 2D → 3D:
// Rigidbody2D        → Rigidbody
// Collider2D         → Collider (Box, Capsule, Mesh...)
// Physics2D.Raycast  → Physics.Raycast
// OnCollisionEnter2D → OnCollisionEnter
// OnTriggerEnter2D   → OnTriggerEnter
// SpriteRenderer     → MeshRenderer + Material
// Camera Orthographic→ Camera Perspective

// Giữ nguyên:
// MonoBehaviour lifecycle (Awake, Start, Update...)
// ScriptableObject, Prefab, tag/layer
// UI Canvas (vẫn dùng như cũ)
// AudioSource, AudioMixer
// Animator, Animation clip`,
   tip:'Học 2D trước rồi mới 3D là đúng thứ tự — 2D ít biến số hơn, hiểu concept xong thì 3D chỉ là thêm 1 chiều.'},

  {sec:'td',cat:'3ddiff',step:'Khác 2D',name:'3D Template — chọn cái nào',
   def:'Khi tạo project 3D trong Unity Hub: chọn "3D (URP)" cho hầu hết game indie. "3D (HDRP)" cho game AAA cần visual cực đẹp (yêu cầu GPU mạnh). "3D (Built-in)" tránh dùng — legacy, sẽ bị deprecated.',
   code:`// Template comparison:
// 3D (URP):
//   → Tốt cho: RPG, platformer, action, indie
//   → GPU: mid-range là đủ
//   → Mobile support: có
//   → Shader Graph: có

// 3D (HDRP):
//   → Tốt cho: AAA, simulation, cinematic
//   → GPU: cần RTX / RX 6000+
//   → Mobile: KHÔNG support
//   → Ray tracing: có

// Switch từ URP sang HDRP sau khi có asset = đau đớn
// → Tất cả material cần làm lại từ đầu`,
   tip:'URP cho 99% indie 3D game — HDRP chỉ khi bạn chắc chắn cần ray tracing và target PC/Console only.'},

  {sec:'td',cat:'3ddiff',step:'Khác 2D',name:'Cinemachine 3D — camera follow & orbit',
   def:'Cinemachine trong 3D có nhiều Virtual Camera type hơn 2D. FreeLook Camera cho third-person orbit (xoay quanh nhân vật). Brain trên Main Camera điều phối blend giữa các Virtual Camera.',
   code:`// Third-person FreeLook Camera:
// Add CinemachineFreeLook lên scene
// Follow: Player transform
// Look At: Player transform (+ height offset)
// Orbits: 3 ring (top, mid, bottom) chỉnh radius + height

// Blend giữa cameras (ví dụ combat → cinematic):
CinemachineBrain brain = Camera.main.GetComponent<CinemachineBrain>();
brain.m_DefaultBlend.m_Time = 1.5f; // blend 1.5s

// Priority: camera priority cao hơn = active
explorationCam.Priority = 10;
combatCam.Priority      = 20; // combat cam win`,
   tip:'Dùng Priority để switch camera — không Activate/Deactivate GameObject. Priority cao nhất luôn là camera active.'},
];

var activeFilters = {};
Object.keys(CAT_META).forEach(function(k){ activeFilters[k] = true; });

function buildFilters() {
  var sec1 = ['editor','scene','go','code','asset'];
  var sec2 = ['cam','tile','sort','path','coord'];
  var wrap = document.getElementById('filters');
  wrap.innerHTML = '';

  function makeBtn(cats, sepLabel) {
    var sep = document.createElement('span');
    sep.style.cssText = 'font-family:var(--mono);font-size:10px;color:var(--hint);padding:4px 4px 4px 0;letter-spacing:.05em;align-self:center;';
    sep.textContent = sepLabel;
    wrap.appendChild(sep);
    cats.forEach(function(cat){
      var btn = document.createElement('button');
      btn.className = 'f-btn active-' + cat;
      btn.textContent = CAT_META[cat].label;
      btn.dataset.cat = cat;
      btn.onclick = function(){ toggle(cat, btn); };
      wrap.appendChild(btn);
    });
  }
  makeBtn(sec1, 'Phần 1');
  makeBtn(sec2, 'Phần 2');
  makeBtn(['dnd','so','arch','calc','pat'], 'Phần 3');
  makeBtn(['turn','action','spell','cstate','carch'], 'Phần 4');
  makeBtn(['dlg','node','quest','npc','darch'], 'Phần 5');
  makeBtn(['canvas','hud','inv','tooltip','uiarch'], 'Phần 6');
  makeBtn(['sdata','sser','sflow'], 'Phần 7');
  makeBtn(['audio','vfx','feel'], 'Phần 8');
  makeBtn(['mmap','mcon','mbal'], 'Phần 9');
  makeBtn(['bopt','bprf','bship'], 'Phần 10');
  makeBtn(['vgit','vart','vcode','vflow','vci'], 'Phần 11');
  makeBtn(['3dcore','3dren','3dphys','3danim','3ddiff'], 'Phần 12');
}

function toggle(cat, btn) {
  activeFilters[cat] = !activeFilters[cat];
  if (activeFilters[cat]) btn.classList.add('active-'+cat);
  else btn.classList.remove('active-'+cat);
  render();
}

function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var list = document.getElementById('list');
  var countEl = document.getElementById('countLine');

  var visible = DATA.filter(function(d){
    if (!activeFilters[d.cat]) return false;
    if (!q) return true;
    return (d.name + d.def + d.tip).toLowerCase().includes(q);
  });

  countEl.textContent = visible.length + ' thuật ngữ hiển thị — bấm để mở';

  if (!visible.length) {
    list.innerHTML = '<div class="empty">Không tìm thấy thuật ngữ nào</div>';
    return;
  }

  var html = '';
  var shownSecs = {};
  SECTIONS.forEach(function(sec){
    var secItems = visible.filter(function(d){ return d.sec === sec.id; });
    if (!secItems.length) return;
    if (!shownSecs[sec.id]) {
      html += '<div class="section-sep"><span class="label" style="color:var(--hint)">' + sec.label + '</span><span class="line"></span></div>';
      shownSecs[sec.id] = true;
    }
    secItems.forEach(function(d){
      var idx = DATA.indexOf(d);
      var meta = CAT_META[d.cat];
      html += '<div class="card" id="card-'+idx+'" onclick="tog('+idx+')">' +
        '<div class="card-head">' +
        '<span class="pill ' + meta.pill + '">' + meta.label + '</span>' +
        '<span class="card-name">' + d.name + '</span>' +
        '<span class="step-tag">' + d.step + '</span>' +
        '<span class="chevron">▼</span>' +
        '</div>' +
        '<div class="card-body">' +
        '<p class="def">' + d.def + '</p>' +
        '<pre class="code-block">' + d.code + '</pre>' +
        '<p class="tip-box">' + d.tip + '</p>' +
        '</div></div>';
    });
  });
  list.innerHTML = html;
}

function tog(idx) {
  var el = document.getElementById('card-'+idx);
  if (el) el.classList.toggle('open');
}

buildFilters();
render();
</script>
